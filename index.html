    6: {
      body: ["#6a6b70", "#464852", "#232632"],
      innerShade: "rgba(8, 14, 26, 0.28)",
      bundleA: "rgba(104, 108, 122, 0.72)",
      bundleB: "rgba(58, 62, 74, 0.72)",
      strawLine: "rgba(167, 255, 187, 0.16)",
      cap: "#7c7f8d",
      rowLine: "rgba(152, 224, 170, 0.26)",
      accent: "night",
    },
  };
  const style = stageStyles[state.stage] || stageStyles[1];

  const bodyGradient = ctx.createLinearGradient(x, y, x + width, y + height);
  bodyGradient.addColorStop(0, style.body[0]);
  bodyGradient.addColorStop(0.45, style.body[1]);
  bodyGradient.addColorStop(1, style.body[2]);

  roundedRectPath(x + 4, y + 10, width - 8, height - 10, 18);
  ctx.fillStyle = bodyGradient;
  ctx.fill();

  ctx.fillStyle = style.innerShade;
  roundedRectPath(x + 10, y + 20, width - 20, height - 26, 16);
  ctx.fill();

  const bundleCount = Math.max(4, Math.floor(height / 54));
  const bundleHeight = Math.max(26, height / bundleCount);
  for (let i = 0; i < bundleCount; i += 1) {
    const by = y + 10 + i * bundleHeight;
    const wobble = (i % 2 === 0 ? 1 : -1) * 2;
    roundedRectPath(x + 6 + wobble, by, width - 12, bundleHeight - 8, 14);
    ctx.fillStyle = i % 2 === 0 ? style.bundleA : style.bundleB;
    ctx.fill();

    ctx.strokeStyle = style.strawLine;
    ctx.lineWidth = 1.6;
    for (let straw = 0; straw < 5; straw += 1) {
      const sx = x + 14 + straw * ((width - 28) / 4);
      ctx.beginPath();
      ctx.moveTo(sx, by + 4);
      ctx.lineTo(sx + (straw % 2 === 0 ? 6 : -4), by + bundleHeight - 12);
      ctx.stroke();
    }
  }

  ctx.fillStyle = style.cap;
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 18);
  ctx.quadraticCurveTo(x + width * 0.5, y - 4, x + width - 8, y + 18);
  ctx.lineTo(x + width - 12, y + 34);
  ctx.quadraticCurveTo(x + width * 0.5, y + 14, x + 12, y + 34);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = style.rowLine;
  ctx.lineWidth = 2;
  for (let row = 16; row < height; row += 20) {
    ctx.beginPath();
    ctx.moveTo(x + 10, y + row);
    ctx.quadraticCurveTo(x + width * 0.5, y + row - 4, x + width - 10, y + row + 2);
    ctx.stroke();
  }

  for (let tuft = 0; tuft < 10; tuft += 1) {
    const tx = x + 8 + tuft * ((width - 16) / 9);
    const ty = y + 8 + (tuft % 3) * 3;
    ctx.beginPath();
    ctx.moveTo(tx, ty + 10);
    ctx.lineTo(tx - 3, ty);
    ctx.lineTo(tx + 2, ty + 4);
    ctx.lineTo(tx + 4, ty - 2);
    ctx.stroke();
  }

  if (style.accent === "storm") {
    ctx.strokeStyle = "rgba(201, 222, 240, 0.22)";
    ctx.lineWidth = 2.2;
    for (let streak = 0; streak < 4; streak += 1) {
      const sx = x + 14 + streak * ((width - 28) / 3);
      ctx.beginPath();
      ctx.moveTo(sx + 8, y + 14);
      ctx.lineTo(sx - 4, y + height - 18);
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(72, 92, 108, 0.2)";
    roundedRectPath(x + 8, y + 14, width - 16, 16, 10);
    ctx.fill();
  } else if (style.accent === "autumn") {
    ctx.fillStyle = "rgba(52, 18, 20, 0.22)";
    roundedRectPath(x + 8, y + 12, width - 16, height - 18, 18);
    ctx.fill();

    const pumpkinRows = Math.max(3, Math.floor(height / 54));
    const rowHeight = Math.max(30, (height - 22) / pumpkinRows);
    for (let row = 0; row < pumpkinRows; row += 1) {
      const centerY = y + 22 + row * rowHeight + rowHeight * 0.38;
      const pumpkinsInRow = row % 2 === 0 ? 2 : 1;
      const rowWobble = Math.sin(state.time * 2.3 + row * 0.9 + x * 0.012) * 3.4;
      for (let col = 0; col < pumpkinsInRow; col += 1) {
        const centerX =
          pumpkinsInRow === 1
            ? x + width * 0.5 + rowWobble
            : x + width * (col === 0 ? 0.34 : 0.66) + rowWobble * (col === 0 ? 0.9 : 1.1);
        const pumpkinW = pumpkinsInRow === 1 ? width * 0.52 : width * 0.34;
        const pumpkinH = rowHeight * 0.58;

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate((rowWobble / 24) * (col === 0 ? -1 : 1));

        const pumpkinGrad = ctx.createRadialGradient(-pumpkinW * 0.16, -pumpkinH * 0.2, 2, 0, 0, pumpkinW);
        pumpkinGrad.addColorStop(0, "#ffd37f");
        pumpkinGrad.addColorStop(0.35, "#f47d1e");
        pumpkinGrad.addColorStop(0.72, "#b24b16");
        pumpkinGrad.addColorStop(1, "#4f1d18");
        ctx.fillStyle = pumpkinGrad;

        ctx.beginPath();
        ctx.ellipse(0, 0, pumpkinW * 0.54, pumpkinH * 0.52, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.ellipse(-pumpkinW * 0.18, 0, pumpkinW * 0.22, pumpkinH * 0.48, 0, 0, Math.PI * 2);
        ctx.ellipse(pumpkinW * 0.18, 0, pumpkinW * 0.22, pumpkinH * 0.48, 0, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(184, 72, 20, 0.96)";
        ctx.fill();

        ctx.fillStyle = "rgba(255, 190, 86, 0.18)";
        ctx.beginPath();
        ctx.ellipse(-pumpkinW * 0.14, -pumpkinH * 0.16, pumpkinW * 0.14, pumpkinH * 0.11, -0.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(74, 22, 18, 0.55)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(0, -pumpkinH * 0.5);
        ctx.lineTo(0, pumpkinH * 0.5);
        ctx.moveTo(-pumpkinW * 0.18, -pumpkinH * 0.44);
        ctx.lineTo(-pumpkinW * 0.18, pumpkinH * 0.44);
        ctx.moveTo(pumpkinW * 0.18, -pumpkinH * 0.44);
        ctx.lineTo(pumpkinW * 0.18, pumpkinH * 0.44);
        ctx.stroke();

        ctx.strokeStyle = "#4d6420";
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(0, -pumpkinH * 0.5);
        ctx.quadraticCurveTo(pumpkinW * 0.02, -pumpkinH * 0.86, pumpkinW * 0.17, -pumpkinH * 0.76);
        ctx.moveTo(pumpkinW * 0.03, -pumpkinH * 0.66);
        ctx.quadraticCurveTo(pumpkinW * 0.2, -pumpkinH * 0.9, pumpkinW * 0.28, -pumpkinH * 0.78);
        ctx.stroke();

        const spookyFace = row % 2 === 0 || pumpkinsInRow === 1;
        if (spookyFace) {
          ctx.fillStyle = "#2a0d0c";
          ctx.beginPath();
          ctx.moveTo(-pumpkinW * 0.22, -pumpkinH * 0.02);
          ctx.lineTo(-pumpkinW * 0.12, -pumpkinH * 0.16);
          ctx.lineTo(-pumpkinW * 0.04, -pumpkinH * 0.01);
          ctx.closePath();
          ctx.moveTo(pumpkinW * 0.22, -pumpkinH * 0.02);
          ctx.lineTo(pumpkinW * 0.12, -pumpkinH * 0.16);
          ctx.lineTo(pumpkinW * 0.04, -pumpkinH * 0.01);
          ctx.closePath();
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(-pumpkinW * 0.22, pumpkinH * 0.16);
          ctx.quadraticCurveTo(0, pumpkinH * 0.34, pumpkinW * 0.22, pumpkinH * 0.12);
          ctx.quadraticCurveTo(0, pumpkinH * 0.28, -pumpkinW * 0.22, pumpkinH * 0.16);
          ctx.closePath();
          ctx.fill();

          ctx.fillStyle = "rgba(255, 208, 95, 0.16)";
          ctx.beginPath();
          ctx.moveTo(-pumpkinW * 0.18, -pumpkinH * 0.01);
          ctx.lineTo(-pumpkinW * 0.12, -pumpkinH * 0.11);
          ctx.lineTo(-pumpkinW * 0.06, -pumpkinH * 0.01);
          ctx.closePath();
          ctx.moveTo(pumpkinW * 0.18, -pumpkinH * 0.01);
          ctx.lineTo(pumpkinW * 0.12, -pumpkinH * 0.11);
          ctx.lineTo(pumpkinW * 0.06, -pumpkinH * 0.01);
          ctx.closePath();
          ctx.moveTo(-pumpkinW * 0.18, pumpkinH * 0.17);
          ctx.quadraticCurveTo(0, pumpkinH * 0.28, pumpkinW * 0.18, pumpkinH * 0.14);
          ctx.quadraticCurveTo(0, pumpkinH * 0.24, -pumpkinW * 0.18, pumpkinH * 0.17);
          ctx.closePath();
          ctx.fill();
        }

        ctx.restore();
      }

      ctx.strokeStyle = "rgba(88, 102, 34, 0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + width * 0.5 + rowWobble * 0.15, centerY - pumpkinRows * 0.8);
      ctx.quadraticCurveTo(
        x + width * 0.5 + rowWobble * 0.55,
        centerY + rowHeight * 0.15,
        x + width * 0.5 + rowWobble * 0.2,
        centerY + rowHeight * 0.4
      );
      ctx.stroke();
    }
  } else if (style.accent === "snow") {
    ctx.fillStyle = "rgba(247, 252, 255, 0.95)";
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 16);
    ctx.quadraticCurveTo(x + width * 0.25, y + 4, x + width * 0.5, y + 14);
    ctx.quadraticCurveTo(x + width * 0.75, y + 2, x + width - 8, y + 18);
    ctx.lineTo(x + width - 10, y + 28);
    ctx.quadraticCurveTo(x + width * 0.5, y + 14, x + 10, y + 28);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(190, 214, 230, 0.6)";
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i += 1) {
      const cx = x + 18 + i * ((width - 36) / 2);
      const cy = y + 34 + (i % 2) * 10;
      ctx.beginPath();
      ctx.moveTo(cx - 4, cy);
      ctx.lineTo(cx + 4, cy);
      ctx.moveTo(cx, cy - 4);
      ctx.lineTo(cx, cy + 4);
      ctx.stroke();
    }

    const lightColors = ["#ff5252", "#ffd95e", "#53d6ff", "#79f28a"];
    const strandYs = [
      y + 26,
      y + Math.max(52, height * 0.26),
      y + Math.max(82, height * 0.48),
      y + Math.max(112, height * 0.7),
    ].filter((strandY) => strandY < y + height - 18);

    ctx.strokeStyle = "rgba(84, 122, 68, 0.55)";
    ctx.lineWidth = 2;
    for (let strand = 0; strand < strandYs.length; strand += 1) {
      const strandY = strandYs[strand];
      const sag = 10 + strand * 2;
      ctx.beginPath();
      ctx.moveTo(x + 10, strandY);
      ctx.quadraticCurveTo(x + width * 0.27, strandY + sag, x + width * 0.5, strandY + sag * 0.35);
      ctx.quadraticCurveTo(x + width * 0.74, strandY - sag * 0.45, x + width - 10, strandY + sag * 0.8);
      ctx.stroke();

      for (let bulb = 0; bulb < 8; bulb += 1) {
        const px = x + 12 + bulb * ((width - 24) / 7);
        const py = strandY + Math.sin(bulb * 1.2 + state.time * 0.8 + strand * 0.7) * (6 + strand) + (bulb % 2) * 4;
        const color = lightColors[(bulb + strand) % lightColors.length];
        const blink = Math.sin(state.time * 7.2 + bulb * 1.7 + strand * 1.3) > 0 ? 1 : 0.22;
        const glow = blink > 0.5 ? 16 : 3;

        ctx.fillStyle = color;
        ctx.globalAlpha = blink;
        ctx.shadowColor = color;
        ctx.shadowBlur = glow;
        ctx.beginPath();
        ctx.ellipse(px, py, 4.4, 6.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        ctx.fillStyle = "rgba(108, 86, 52, 0.95)";
        ctx.fillRect(px - 1.2, py - 7.2, 2.4, 3);
      }
    }
  } else if (style.accent === "shamrock") {
    ctx.strokeStyle = "rgba(38, 126, 58, 0.8)";
    ctx.lineWidth = 3;
    const vineStartX = x + width * 0.26;
    const vineAmplitude = width * 0.16;
    ctx.beginPath();
    ctx.moveTo(vineStartX, y + 10);
    for (let step = 0; step <= 6; step += 1) {
      const py = y + 12 + (height - 26) * (step / 6);
      const px = vineStartX + Math.sin(step * 1.28 + state.time * 1.3 + x * 0.01) * vineAmplitude;
      ctx.lineTo(px, py);
    }
    ctx.stroke();

    ctx.beginPath();
    const secondStartX = x + width * 0.67;
    ctx.moveTo(secondStartX, y + 20);
    for (let step = 0; step <= 5; step += 1) {
      const py = y + 24 + (height - 34) * (step / 5);
      const px = secondStartX + Math.cos(step * 1.14 + state.time * 1.15 + x * 0.014) * (vineAmplitude * 0.82);
      ctx.lineTo(px, py);
    }
    ctx.stroke();

    for (let i = 0; i < 3; i += 1) {
      const cx = x + 18 + i * ((width - 36) / 2);
      const cy = y + 30 + (i % 2) * 18;
      const size = 5;
      ctx.fillStyle = "rgba(51, 137, 66, 0.94)";
      ctx.beginPath();
      ctx.arc(cx, cy - size, size, 0, Math.PI * 2);
      ctx.arc(cx - size, cy, size, 0, Math.PI * 2);
      ctx.arc(cx + size, cy, size, 0, Math.PI * 2);
      ctx.arc(cx, cy + size, size, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(30, 102, 53, 0.85)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(cx + 1, cy + 4);
      ctx.quadraticCurveTo(cx + 7, cy + 11, cx + 2, cy + 16);
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(69, 168, 87, 0.9)";
    for (let leaf = 0; leaf < 8; leaf += 1) {
      const t = leaf / 7;
      const px = vineStartX + Math.sin(leaf * 1.28 + state.time * 1.3 + x * 0.01) * vineAmplitude;
      const py = y + 16 + (height - 34) * t;
      ctx.beginPath();
      ctx.ellipse(px - 5, py, 6, 3.2, -0.7, 0, Math.PI * 2);
      ctx.ellipse(px + 5, py + 2, 6, 3.2, 0.65, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (style.accent === "night") {
    ctx.fillStyle = "rgba(154, 255, 182, 0.18)";
    roundedRectPath(x + 10, y + 18, width - 20, 22, 10);
    ctx.fill();

    ctx.strokeStyle = "rgba(133, 245, 165, 0.4)";
    ctx.lineWidth = 1.4;
    for (let i = 0; i < 3; i += 1) {
      const glowX = x + 18 + i * ((width - 36) / 2);
      ctx.beginPath();
      ctx.moveTo(glowX, y + 16);
      ctx.lineTo(glowX, y + height - 16);
      ctx.stroke();
    }

    ctx.fillStyle = "rgba(235, 244, 255, 0.55)";
    for (let i = 0; i < 3; i += 1) {
      const starX = x + 20 + i * ((width - 40) / 2);
      const starY = y + 34 + (i % 2) * 16;
      ctx.beginPath();
      ctx.arc(starX, starY, 1.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawJackOLanternTower(x, y, width, height) {
  const padding = 8;
  const usableHeight = Math.max(0, height - 16);
  const layers = Math.max(2, Math.floor(usableHeight / 46));
  const layerHeight = Math.max(34, usableHeight / layers);

  ctx.save();

  for (let layer = 0; layer < layers; layer += 1) {
    const centerY = y + padding + layerHeight * layer + layerHeight * 0.5;
    const wobble = Math.sin(state.time * 3 + layer * 1.1 + x * 0.02) * 5.8;
    const bounce = Math.cos(state.time * 3.3 + layer * 0.95 + x * 0.016) * 1.6;
    const size = Math.min(width - 18, layerHeight - 8);
    const pumpkinSize = Math.max(26, size);
    const left = x + (width - pumpkinSize) / 2 + wobble;
    const top = centerY - pumpkinSize / 2 + bounce;
    const radius = pumpkinSize * 0.16;

    ctx.save();
    ctx.translate(left + pumpkinSize / 2, top + pumpkinSize / 2);
    ctx.rotate((wobble / 24) * (layer % 2 === 0 ? 1 : -1));
    ctx.translate(-(left + pumpkinSize / 2), -(top + pumpkinSize / 2));

    const body = ctx.createLinearGradient(left, top, left, top + pumpkinSize);
    body.addColorStop(0, "#ffbf52");
    body.addColorStop(0.42, "#ee761d");
    body.addColorStop(0.8, "#a84418");
    body.addColorStop(1, "#561d18");
    ctx.fillStyle = body;
    roundedRectPath(left, top, pumpkinSize, pumpkinSize, radius);
    ctx.fill();

    ctx.fillStyle = "rgba(255, 206, 118, 0.16)";
    roundedRectPath(left + pumpkinSize * 0.1, top + pumpkinSize * 0.08, pumpkinSize * 0.26, pumpkinSize * 0.18, 8);
    ctx.fill();

    ctx.strokeStyle = "rgba(98, 38, 18, 0.45)";
    ctx.lineWidth = 1.4;
    for (let groove = 1; groove <= 3; groove += 1) {
      const gx = left + (pumpkinSize / 4) * groove;
      ctx.beginPath();
      ctx.moveTo(gx, top + pumpkinSize * 0.08);
      ctx.lineTo(gx, top + pumpkinSize * 0.92);
      ctx.stroke();
    }

    ctx.fillStyle = "#26100f";
    ctx.beginPath();
    ctx.moveTo(left + pumpkinSize * 0.23, top + pumpkinSize * 0.36);
    ctx.lineTo(left + pumpkinSize * 0.34, top + pumpkinSize * 0.24);
    ctx.lineTo(left + pumpkinSize * 0.42, top + pumpkinSize * 0.38);
    ctx.closePath();
    ctx.moveTo(left + pumpkinSize * 0.77, top + pumpkinSize * 0.36);
    ctx.lineTo(left + pumpkinSize * 0.66, top + pumpkinSize * 0.24);
    ctx.lineTo(left + pumpkinSize * 0.58, top + pumpkinSize * 0.38);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(left + pumpkinSize * 0.24, top + pumpkinSize * 0.66);
    ctx.lineTo(left + pumpkinSize * 0.35, top + pumpkinSize * 0.56);
    ctx.lineTo(left + pumpkinSize * 0.46, top + pumpkinSize * 0.66);
    ctx.lineTo(left + pumpkinSize * 0.56, top + pumpkinSize * 0.56);
    ctx.lineTo(left + pumpkinSize * 0.67, top + pumpkinSize * 0.66);
    ctx.lineTo(left + pumpkinSize * 0.76, top + pumpkinSize * 0.58);
    ctx.lineTo(left + pumpkinSize * 0.76, top + pumpkinSize * 0.74);
    ctx.lineTo(left + pumpkinSize * 0.24, top + pumpkinSize * 0.74);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "rgba(255, 215, 104, 0.14)";
    ctx.beginPath();
    ctx.moveTo(left + pumpkinSize * 0.26, top + pumpkinSize * 0.65);
    ctx.lineTo(left + pumpkinSize * 0.35, top + pumpkinSize * 0.58);
    ctx.lineTo(left + pumpkinSize * 0.45, top + pumpkinSize * 0.65);
    ctx.lineTo(left + pumpkinSize * 0.56, top + pumpkinSize * 0.58);
    ctx.lineTo(left + pumpkinSize * 0.66, top + pumpkinSize * 0.65);
    ctx.lineTo(left + pumpkinSize * 0.73, top + pumpkinSize * 0.6);
    ctx.lineTo(left + pumpkinSize * 0.73, top + pumpkinSize * 0.7);
    ctx.lineTo(left + pumpkinSize * 0.26, top + pumpkinSize * 0.7);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#4b621d";
    ctx.lineWidth = 2.3;
    ctx.beginPath();
    ctx.moveTo(left + pumpkinSize * 0.52, top + pumpkinSize * 0.02);
    ctx.quadraticCurveTo(left + pumpkinSize * 0.48, top - pumpkinSize * 0.12, left + pumpkinSize * 0.62, top - pumpkinSize * 0.08);
    ctx.stroke();

    ctx.restore();
  }

  ctx.restore();
}

function drawSnowballTower(x, y, width, height) {
  const padding = 8;
  const usableHeight = Math.max(0, height - 16);
  const layers = Math.max(2, Math.floor(usableHeight / 42));
  const layerHeight = Math.max(30, usableHeight / layers);

  ctx.save();

  for (let layer = 0; layer < layers; layer += 1) {
    const centerY = y + padding + layerHeight * layer + layerHeight * 0.5;
    const wobble = Math.sin(state.time * 2.5 + layer * 0.9 + x * 0.018) * 4.4;
    const bounce = Math.cos(state.time * 2.9 + layer * 1.15 + x * 0.015) * 1.1;
    const size = Math.min(width - 16, layerHeight);
    const snowSize = Math.max(24, size * 0.9);
    const centerX = x + width * 0.5 + wobble;

    ctx.save();
    ctx.translate(centerX, centerY + bounce);
    ctx.rotate((wobble / 28) * (layer % 2 === 0 ? 1 : -1));

    const grad = ctx.createRadialGradient(-snowSize * 0.15, -snowSize * 0.2, 2, 0, 0, snowSize * 0.6);
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.6, "#eef7ff");
    grad.addColorStop(1, "#bfd5e6");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, snowSize * 0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(184, 206, 221, 0.9)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.arc(0, 0, snowSize * 0.36, 0.4, Math.PI * 1.55);
    ctx.stroke();

    ctx.fillStyle = "rgba(255, 255, 255, 0.32)";
    ctx.beginPath();
    ctx.arc(-snowSize * 0.16, -snowSize * 0.14, snowSize * 0.11, 0, Math.PI * 2);
    ctx.fill();

    if (layer < layers - 1) {
      ctx.fillStyle = "#6c4d35";
      ctx.fillRect(-2, snowSize * 0.32, 4, 8);
      ctx.fillStyle = "#2f8f54";
      ctx.beginPath();
      ctx.arc(-5, snowSize * 0.36, 4, 0, Math.PI * 2);
      ctx.arc(5, snowSize * 0.36, 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  ctx.restore();
}

function drawEgg(egg) {
  ctx.save();
  ctx.translate(egg.x, egg.y);
  ctx.rotate(Math.sin(egg.rot) * 0.28);
  ctx.scale(0.88, 1.12);

  const shellGradient = ctx.createRadialGradient(-4, -8, 2, 0, 0, egg.radius);
  shellGradient.addColorStop(0, "#fffdf0");
  shellGradient.addColorStop(1, "#f2ddaf");
  ctx.fillStyle = shellGradient;
  ctx.beginPath();
  ctx.ellipse(0, 0, egg.radius * 0.92, egg.radius, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ddb773";
  for (let i = 0; i < 4; i += 1) {
    ctx.beginPath();
    ctx.arc(
      -egg.radius * 0.3 + i * (egg.radius * 0.22),
      -egg.radius * 0.25 + (i % 2) * 6,
      2.2,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
  ctx.restore();
}

function drawRaindrop(raindrop) {
  ctx.save();
  ctx.translate(raindrop.x, raindrop.y);
  ctx.rotate(raindrop.spin);

  const hailGradient = ctx.createRadialGradient(
    -raindrop.radius * 0.24,
    -raindrop.radius * 0.32,
    2,
    0,
    0,
    raindrop.radius
  );
  hailGradient.addColorStop(0, "rgba(249, 253, 255, 0.98)");
  hailGradient.addColorStop(0.55, "rgba(204, 223, 238, 0.98)");
  hailGradient.addColorStop(1, "rgba(122, 156, 188, 0.98)");
  ctx.fillStyle = hailGradient;

  ctx.beginPath();
  for (let i = 0; i < raindrop.facets; i += 1) {
    const angle = (i / raindrop.facets) * Math.PI * 2;
    const rough = raindrop.radius * (0.82 + (i % 2 === 0 ? 0.18 : -0.08));
    const px = Math.cos(angle) * rough;
    const py = Math.sin(angle) * rough;
    if (i === 0) {
      ctx.moveTo(px, py);
    } else {
      ctx.lineTo(px, py);
    }
  }
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "rgba(240, 248, 255, 0.62)";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-raindrop.radius * 0.35, -raindrop.radius * 0.16);
  ctx.lineTo(raindrop.radius * 0.08, -raindrop.radius * 0.42);
  ctx.moveTo(-raindrop.radius * 0.06, raindrop.radius * 0.08);
  ctx.lineTo(raindrop.radius * 0.34, raindrop.radius * 0.24);
  ctx.stroke();
  ctx.restore();
}

function drawLeaf(leaf) {
  ctx.save();
  ctx.translate(leaf.x, leaf.y);
  ctx.rotate(leaf.spin);

  const leafColors = {
    orange: ["#ffbf5a", "#df7c26"],
    gold: ["#ffd769", "#d79c2c"],
    red: ["#e57d51", "#b44630"],
  };
  const [light, dark] = leafColors[leaf.hue];
  const grad = ctx.createLinearGradient(0, -leaf.radius, 0, leaf.radius);
  grad.addColorStop(0, light);
  grad.addColorStop(1, dark);
  ctx.fillStyle = grad;

  ctx.beginPath();
  ctx.moveTo(0, -leaf.radius);
  ctx.bezierCurveTo(leaf.radius * 0.9, -leaf.radius * 0.6, leaf.radius * 0.7, leaf.radius * 0.2, 0, leaf.radius);
  ctx.bezierCurveTo(-leaf.radius * 0.7, leaf.radius * 0.2, -leaf.radius * 0.9, -leaf.radius * 0.6, 0, -leaf.radius);
  ctx.fill();

  ctx.strokeStyle = "rgba(114, 62, 29, 0.5)";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, -leaf.radius);
  ctx.lineTo(0, leaf.radius);
  ctx.moveTo(0, -leaf.radius * 0.12);
  ctx.lineTo(leaf.radius * 0.34, -leaf.radius * 0.36);
  ctx.moveTo(0, leaf.radius * 0.18);
  ctx.lineTo(-leaf.radius * 0.32, leaf.radius * 0.42);
  ctx.stroke();
  ctx.restore();
}

function drawSnowball(snowball) {
  ctx.save();
  ctx.translate(snowball.x, snowball.y);
  ctx.rotate(Math.sin(snowball.rot) * 0.22);

  const grad = ctx.createRadialGradient(-4, -5, 2, 0, 0, snowball.radius);
  grad.addColorStop(0, "#ffffff");
  grad.addColorStop(0.65, "#edf7ff");
  grad.addColorStop(1, "#c6dbe8");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, snowball.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(170, 197, 212, 0.8)";
  ctx.lineWidth = 1.1;
  ctx.beginPath();
  ctx.arc(0, 0, snowball.radius * 0.68, 0.4, Math.PI * 1.5);
  ctx.stroke();
  ctx.restore();
}

function drawClover(clover) {
  ctx.save();
  ctx.translate(clover.x, clover.y);
  ctx.rotate(clover.spin);

  ctx.shadowColor = "rgba(132, 83, 17, 0.2)";
  ctx.shadowBlur = clover.radius * 0.35;

  const coinGradient = ctx.createRadialGradient(-clover.radius * 0.24, -clover.radius * 0.28, 2, 0, 0, clover.radius * 1.02);
  coinGradient.addColorStop(0, "#f7e7a3");
  coinGradient.addColorStop(0.35, "#dcb554");
  coinGradient.addColorStop(0.7, "#b88428");
  coinGradient.addColorStop(1, "#7a4d12");
  ctx.fillStyle = coinGradient;
  ctx.beginPath();
  ctx.arc(0, 0, clover.radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#5f3b0b";
  ctx.lineWidth = Math.max(1.9, clover.radius * 0.18);
  ctx.beginPath();
  ctx.arc(0, 0, clover.radius * 0.92, 0, Math.PI * 2);
  ctx.stroke();

  ctx.strokeStyle = "rgba(241, 218, 143, 0.72)";
  ctx.lineWidth = Math.max(0.9, clover.radius * 0.08);
  ctx.beginPath();
  for (let i = 0; i < 14; i += 1) {
    const angle = (Math.PI * 2 * i) / 14;
    const inner = clover.radius * 0.78;
    const outer = clover.radius * 0.92;
    ctx.moveTo(Math.cos(angle) * inner, Math.sin(angle) * inner);
    ctx.lineTo(Math.cos(angle) * outer, Math.sin(angle) * outer);
  }
  ctx.stroke();

  ctx.strokeStyle = "rgba(92, 57, 13, 0.55)";
  ctx.lineWidth = Math.max(1.1, clover.radius * 0.1);
  ctx.beginPath();
  ctx.arc(0, 0, clover.radius * 0.62, 0, Math.PI * 2);
  ctx.stroke();

  ctx.fillStyle = "rgba(242, 224, 170, 0.82)";
  ctx.beginPath();
  ctx.ellipse(-clover.radius * 0.24, -clover.radius * 0.3, clover.radius * 0.22, clover.radius * 0.12, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "rgba(101, 62, 13, 0.78)";
  ctx.lineWidth = Math.max(1, clover.radius * 0.09);
  ctx.beginPath();
  ctx.moveTo(0, -clover.radius * 0.32);
  ctx.lineTo(0, clover.radius * 0.34);
  ctx.moveTo(-clover.radius * 0.22, -clover.radius * 0.02);
  ctx.lineTo(clover.radius * 0.22, -clover.radius * 0.02);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -clover.radius * 0.34);
  ctx.lineTo(clover.radius * 0.1, -clover.radius * 0.16);
  ctx.lineTo(0, -clover.radius * 0.12);
  ctx.lineTo(-clover.radius * 0.1, -clover.radius * 0.16);
  ctx.closePath();
  ctx.stroke();

  ctx.restore();
}

function drawFeather(feather) {
  ctx.save();
  ctx.translate(feather.x, feather.y);
  ctx.rotate(feather.spin);
  ctx.scale(feather.size, feather.size);
  ctx.globalAlpha = Math.max(feather.life, 0) * 0.9;
  ctx.fillStyle = "#fff9f2";
  ctx.beginPath();
  ctx.moveTo(0, -9);
  ctx.quadraticCurveTo(8, -4, 4, 9);
  ctx.quadraticCurveTo(-4, 6, 0, -9);
  ctx.fill();
  ctx.strokeStyle = "#e8c9aa";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, -9);
  ctx.lineTo(0, 9);
  ctx.stroke();
  ctx.restore();
}

function drawMeteor(meteor) {
  ctx.save();
  ctx.translate(meteor.x, meteor.y);
  ctx.rotate(meteor.rot);

  const trail = ctx.createLinearGradient(-meteor.radius * 1.8, 0, meteor.radius, 0);
  trail.addColorStop(0, "rgba(103, 255, 170, 0)");
  trail.addColorStop(0.4, "rgba(103, 255, 170, 0.35)");
  trail.addColorStop(1, "rgba(255, 188, 84, 0.1)");
  ctx.fillStyle = trail;
  ctx.beginPath();
  ctx.moveTo(-meteor.radius * 2.2, -meteor.radius * 0.3);
  ctx.lineTo(-meteor.radius * 0.25, -meteor.radius * 0.58);
  ctx.lineTo(-meteor.radius * 0.25, meteor.radius * 0.58);
  ctx.lineTo(-meteor.radius * 2.2, meteor.radius * 0.3);
  ctx.closePath();
  ctx.fill();

  const rock = ctx.createRadialGradient(-3, -4, 2, 0, 0, meteor.radius);
  rock.addColorStop(0, "#ffd08f");
  rock.addColorStop(0.5, "#dc7a43");
  rock.addColorStop(1, "#723726");
  ctx.fillStyle = rock;
  ctx.beginPath();
  for (let i = 0; i < 7; i += 1) {
    const angle = (i / 7) * Math.PI * 2;
    const r = meteor.radius * (0.78 + (i % 2 === 0 ? 0.18 : -0.08));
    const px = Math.cos(angle) * r;
    const py = Math.sin(angle) * r;
    if (i === 0) {
      ctx.moveTo(px, py);
    } else {
      ctx.lineTo(px, py);
    }
  }
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = "rgba(255, 230, 178, 0.45)";
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(-meteor.radius * 0.26, -meteor.radius * 0.2);
  ctx.lineTo(meteor.radius * 0.28, meteor.radius * 0.12);
  ctx.stroke();
  ctx.restore();
}

function drawChicken() {
  const chicken = state.chicken;
  const wingBeat = Math.sin(chicken.wingPhase);
  const wingLift = wingBeat * 18;
  const wingTilt = wingBeat * 0.55;
  const wingSpread = 15 + Math.max(0, wingBeat) * 8;
  const stormStage = state.stage === 2;
  const autumnCapeStage = state.stage === 3;
  const shamrockStage = state.stage === 5;
  const festiveStage = state.stage === 4;
  const ufoStage = state.stage === 6;

  ctx.save();
  ctx.translate(chicken.x, chicken.y);
  ctx.rotate(chicken.tilt);

  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.beginPath();
  ctx.ellipse(4, 44, 34, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  if (ufoStage) {
    const pulse = 0.75 + (Math.sin(state.time * 5.5) + 1) * 0.12;
    ctx.fillStyle = "rgba(110, 255, 164, 0.16)";
    ctx.beginPath();
    ctx.ellipse(0, 46, 56 * pulse, 16 * pulse, 0, 0, Math.PI * 2);
    ctx.fill();

    const dome = ctx.createRadialGradient(-6, -18, 4, 0, -14, 26);
    dome.addColorStop(0, "rgba(220, 255, 236, 0.95)");
    dome.addColorStop(1, "rgba(88, 219, 145, 0.58)");
    ctx.fillStyle = dome;
    ctx.beginPath();
    ctx.ellipse(0, -10, 24, 18, 0, Math.PI, 0, true);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#a8c2cf";
    ctx.beginPath();
    ctx.ellipse(0, 6, 38, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#6d7f8d";
    ctx.beginPath();
    ctx.ellipse(0, 11, 28, 6, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#7dff99";
    for (let i = -2; i <= 2; i += 1) {
      ctx.beginPath();
      ctx.arc(i * 12, 10, 3.6, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = "rgba(120, 255, 176, 0.22)";
    ctx.beginPath();
    ctx.moveTo(-22, 12);
    ctx.lineTo(-38, 48);
    ctx.lineTo(-10, 22);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(22, 12);
    ctx.lineTo(38, 48);
    ctx.lineTo(10, 22);
    ctx.closePath();
    ctx.fill();
  }

  if (autumnCapeStage) {
    const capeFlow = Math.sin(state.time * 6.2 + chicken.wingPhase) * 4.5;
    const capeLift = Math.cos(state.time * 4.4 + chicken.wingPhase * 0.35) * 3.4;
    const capeGradient = ctx.createLinearGradient(-34, -10, -6, 42);
    capeGradient.addColorStop(0, "rgba(52, 52, 58, 0.96)");
    capeGradient.addColorStop(0.55, "rgba(14, 14, 20, 0.98)");
    capeGradient.addColorStop(1, "rgba(0, 0, 0, 0.92)");
    ctx.fillStyle = capeGradient;
    ctx.beginPath();
    ctx.moveTo(-18, -8);
    ctx.quadraticCurveTo(-32, -6 - capeLift, -34, 10);
    ctx.quadraticCurveTo(-28 + capeFlow * 0.25, 26 + capeLift, -18, 34);
    ctx.quadraticCurveTo(-7 + capeFlow * 0.45, 22, -6, 8);
    ctx.quadraticCurveTo(-10, -2, -18, -8);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(112, 112, 122, 0.34)";
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(-17, -5);
    ctx.quadraticCurveTo(-27, 4 + capeLift * 0.2, -25, 24);
    ctx.stroke();
  }

  const bodyGradient = ctx.createRadialGradient(-8, -8, 6, 0, 0, 40);
  bodyGradient.addColorStop(0, "#fffbe7");
  bodyGradient.addColorStop(1, "#f3d86d");
  ctx.fillStyle = bodyGradient;
  ctx.beginPath();
  ctx.ellipse(0, 0, 32, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  if (stormStage) {
    const raincoatSwing = Math.sin(state.time * 5.8 + chicken.wingPhase * 0.4) * 1.4;
    ctx.fillStyle = "#ffd84d";
    ctx.beginPath();
    ctx.moveTo(-10, 8);
    ctx.quadraticCurveTo(1, 15, 14, 10);
    ctx.lineTo(12, 20);
    ctx.quadraticCurveTo(0, 25 + raincoatSwing * 0.25, -11, 18);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(184, 124, 0, 0.45)";
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(3, 10);
    ctx.lineTo(2.5, 21);
    ctx.stroke();

    ctx.fillStyle = "#f5b700";
    ctx.beginPath();
    ctx.moveTo(2, 12);
    ctx.lineTo(8.5, 16);
    ctx.lineTo(4, 21);
    ctx.closePath();
    ctx.fill();
  } else if (shamrockStage) {
    const bowSwing = Math.sin(state.time * 6.4 + chicken.wingPhase * 0.5) * 1.6;
    ctx.fillStyle = "#1f8f45";
    ctx.beginPath();
    ctx.moveTo(-10, 8);
    ctx.quadraticCurveTo(2, 15, 14, 10);
    ctx.lineTo(13, 18);
    ctx.quadraticCurveTo(1, 23, -10, 18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#135d2a";
    ctx.beginPath();
    ctx.moveTo(5, 10);
    ctx.lineTo(14 + bowSwing, 15);
    ctx.lineTo(7, 20);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(5, 10);
    ctx.lineTo(-3 - bowSwing, 15);
    ctx.lineTo(3, 20);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#f0c85e";
    ctx.fillRect(3.6, 12.3, 3.2, 3.2);
    ctx.clearRect(4.45, 13.15, 1.5, 1.5);
  } else if (festiveStage) {
    const scarfWave = Math.sin(state.time * 7 + chicken.wingPhase) * 4;
    ctx.fillStyle = "#d93b34";
    ctx.beginPath();
    ctx.moveTo(-8, 8);
    ctx.quadraticCurveTo(2, 16, 14, 10);
    ctx.lineTo(12, 18);
    ctx.quadraticCurveTo(0, 24, -10, 18);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(8, 14);
    ctx.quadraticCurveTo(26 + scarfWave, 18, 20 + scarfWave, 34);
    ctx.quadraticCurveTo(14 + scarfWave * 0.4, 28, 8, 22);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(255, 220, 220, 0.42)";
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(11, 18);
    ctx.lineTo(18 + scarfWave * 0.55, 31);
    ctx.stroke();
  }

  ctx.save();
  ctx.translate(-13, 1);
  ctx.rotate(-1.05 + wingTilt);
  ctx.fillStyle = "#eebf49";
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, wingSpread, 0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#fff0b3";
  ctx.beginPath();
  ctx.ellipse(2, 0, 6, wingSpread * 0.58, 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(15, 1);
  ctx.rotate(1.05 - wingTilt);
  ctx.fillStyle = "#e7b33b";
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, wingSpread - 1, -0.15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#fff0b3";
  ctx.beginPath();
  ctx.ellipse(-2, 0, 6, (wingSpread - 1) * 0.56, -0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.fillStyle = "#fff2c9";
  ctx.beginPath();
  ctx.ellipse(4, -2, 20, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ef5f42";
  ctx.beginPath();
  ctx.arc(-8, -23, 5.5, Math.PI, Math.PI * 2);
  ctx.arc(0, -26, 5.5, Math.PI, Math.PI * 2);
  ctx.arc(8, -23, 5.5, Math.PI, Math.PI * 2);
  ctx.fill();

  if (stormStage) {
    const brimDip = Math.sin(state.time * 4.9 + chicken.wingPhase * 0.25) * 1.4;
    ctx.fillStyle = "#ffd84d";
    ctx.beginPath();
    ctx.ellipse(-1, -24, 18.5, 5.6, -0.04, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-10, -24);
    ctx.quadraticCurveTo(-7, -39, 0, -42 - brimDip * 0.4);
    ctx.quadraticCurveTo(10, -39, 9, -24);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(184, 124, 0, 0.5)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-12, -24);
    ctx.quadraticCurveTo(-2, -18 + brimDip * 0.2, 11, -24);
    ctx.stroke();
  } else if (autumnCapeStage) {
    const hatWobble = Math.sin(state.time * 5.2 + chicken.wingPhase * 0.45) * 3.5;
    ctx.fillStyle = "#141217";
    ctx.beginPath();
    ctx.ellipse(-2, -25, 19, 5.2, -0.06, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-11, -24);
    ctx.quadraticCurveTo(-6, -48, 9, -53 + hatWobble * 0.3);
    ctx.quadraticCurveTo(18, -37, 7, -25);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#7a4bc2";
    ctx.beginPath();
    ctx.moveTo(-14, -28);
    ctx.quadraticCurveTo(-2, -24 + hatWobble * 0.08, 12, -29);
    ctx.lineTo(10, -24);
    ctx.quadraticCurveTo(-2, -20, -16, -24);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgba(200, 183, 255, 0.38)";
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(3, -44);
    ctx.quadraticCurveTo(15, -50 + hatWobble * 0.15, 12, -34);
    ctx.stroke();
  } else if (shamrockStage) {
    const hatBounce = Math.sin(state.time * 4.8 + chicken.wingPhase * 0.35) * 2.3;
    ctx.fillStyle = "#176b2f";
    ctx.beginPath();
    ctx.ellipse(-1, -24, 20, 5.8, -0.03, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-12, -24);
    ctx.lineTo(-8, -44 + hatBounce * 0.2);
    ctx.quadraticCurveTo(1, -58 + hatBounce, 12, -44);
    ctx.lineTo(10, -24);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#103d1c";
    ctx.beginPath();
    ctx.moveTo(1, -48);
    ctx.quadraticCurveTo(12, -52 + hatBounce * 0.2, 9, -34);
    ctx.quadraticCurveTo(2, -39, 1, -48);
    ctx.fill();

    ctx.fillStyle = "#f2c95c";
    ctx.fillRect(-4, -30, 8, 5.2);
    ctx.clearRect(-1.7, -28.8, 3.4, 2.8);
  } else if (festiveStage) {
    ctx.fillStyle = "#d93b34";
    ctx.beginPath();
    ctx.moveTo(-18, -22);
    ctx.quadraticCurveTo(-8, -42, 12, -34);
    ctx.lineTo(3, -24);
    ctx.quadraticCurveTo(-6, -30, -18, -22);
    ctx.fill();

    ctx.fillStyle = "#fff8f0";
    ctx.beginPath();
    ctx.ellipse(-6, -23, 12, 5.5, 0.06, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(12, -34, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.arc(-10, -8, 9, 0, Math.PI * 2);
  ctx.arc(7, -10, 11, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#2f2017";
  ctx.beginPath();
  ctx.arc(-8 + Math.sin(state.time * 5) * 1.2, -6, 3.8, 0, Math.PI * 2);
  ctx.arc(8 + Math.cos(state.time * 4.5) * 1.6, -9, 4.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#ff8b2d";
  ctx.beginPath();
  ctx.moveTo(9, 0);
  ctx.lineTo(28, 4);
  ctx.lineTo(9, 10);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#f7a63b";
  ctx.beginPath();
  ctx.moveTo(-28, -4);
  ctx.lineTo(-38, -12);
  ctx.lineTo(-36, 4);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = "#fff7e2";
  ctx.beginPath();
  ctx.ellipse(-3, 6 + wingLift * 0.05, 10, 7, 0.12, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#c98122";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-4, 22);
  ctx.lineTo(-8, 34);
  ctx.moveTo(6, 22);
  ctx.lineTo(8, 36);
  ctx.stroke();

  ctx.restore();

}

function draw() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const floorHeight = 118;

  drawBackground();

  for (const haystack of state.haystacks) {
    if (state.stage === 3) {
      drawJackOLanternTower(haystack.x, 0, haystack.width, haystack.gapY);
      drawJackOLanternTower(
        haystack.x,
        haystack.gapY + haystack.gap,
        haystack.width,
        h - floorHeight - (haystack.gapY + haystack.gap)
      );
    } else {
      drawHaystack(haystack.x, 0, haystack.width, haystack.gapY, true);
      drawHaystack(
        haystack.x,
        haystack.gapY + haystack.gap,
        haystack.width,
        h - floorHeight - (haystack.gapY + haystack.gap),
        false
      );
    }
  }

  for (const egg of state.eggs) {
    drawEgg(egg);
  }

  for (const raindrop of state.raindrops) {
    drawRaindrop(raindrop);
  }

  for (const leaf of state.leaves) {
    drawLeaf(leaf);
  }

  for (const snowball of state.snowballs) {
    drawSnowball(snowball);
  }

  for (const clover of state.clovers) {
    drawClover(clover);
  }

  for (const meteor of state.meteors) {
    drawMeteor(meteor);
  }

  for (const feather of state.feathers) {
    drawFeather(feather);
  }

  drawChicken();

  if (state.stage === 1) {
    ctx.fillStyle = "rgba(103, 76, 35, 0.92)";
    ctx.font = '900 18px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Stage 1: Blue Sky Farm", w / 2, 122);
  } else if (state.stage === 2) {
    ctx.fillStyle = "rgba(242, 249, 255, 0.88)";
    ctx.font = '900 18px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Stage 2: Thunderstorm Hail", w / 2, 122);
  } else if (state.stage === 3) {
    ctx.fillStyle = "rgba(126, 66, 22, 0.92)";
    ctx.font = '900 18px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Stage 3: Autumn Leaves", w / 2, 122);
  } else if (state.stage === 4) {
    ctx.fillStyle = "rgba(46, 97, 132, 0.92)";
    ctx.font = '900 18px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Stage 4: Christmas Snow", w / 2, 122);
  } else if (state.stage === 5) {
    ctx.fillStyle = "rgba(30, 102, 53, 0.95)";
    ctx.font = '900 18px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Stage 5: Shamrock Clover", w / 2, 122);
  } else if (state.stage === 6) {
    ctx.fillStyle = "rgba(171, 255, 196, 0.95)";
    ctx.font = '900 18px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Stage 6: Night UFO Farm", w / 2, 122);
  }

  if (state.stageFlash > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, state.stageFlash) * 0.92;
    ctx.fillStyle = "rgba(21, 43, 62, 0.55)";
    roundedRectPath(w * 0.18, h * 0.28, w * 0.64, 74, 24);
    ctx.fill();
    ctx.fillStyle = "#f2fbff";
    ctx.font = '900 28px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText(
      state.stage === 1
        ? "Blue Sky Farm"
        : state.stage === 2
            ? "Thunderstorm!"
            : state.stage === 3
              ? "Fall Harvest"
              : state.stage === 4
                ? "Christmas Cheer"
                : state.stage === 5
                  ? "Shamrock Sprint"
                  : "Midnight Moo-n",
      w / 2,
      h * 0.28 + 46
    );
    ctx.restore();
  }

  if (!state.running && !state.gameOver) {
    ctx.fillStyle = "rgba(255,255,255,0.75)";
    ctx.font = '900 22px "Avenir Next Condensed", "Trebuchet MS", "Segoe UI", sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("Tap anywhere to soar", w / 2, h * 0.72);
  }
}

let lastTime = performance.now();

function frame(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.033);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);

function triggerAction(event, action, options = {}) {
  if (event) {
    if (options.preventDefault !== false && event.cancelable) {
      event.preventDefault();
    }
    if (options.stopPropagation) {
      event.stopPropagation();
    }
  }
  action();
}

function bindTapAction(element, action, options = {}) {
  let touchHandled = false;

  const run = (event) => {
    triggerAction(event, action, options);
  };

  element.addEventListener("pointerdown", run);
  element.addEventListener(
    "touchstart",
    (event) => {
      touchHandled = true;
      run(event);
    },
    { passive: false }
  );
  element.addEventListener("click", (event) => {
    if (touchHandled) {
      touchHandled = false;
      return;
    }
    run(event);
  });
}

function bindDirectButtonAction(element, action) {
  element.onclick = () => {
    action();
  };
  element.ontouchend = (event) => {
    if (event.cancelable) {
      event.preventDefault();
    }
    action();
  };
}
function handlePress(event) {
  if (overlay.classList.contains("visible")) {
    return;
  }
  triggerAction(event, () => flap());
}

function syncMoveButtons() {
  moveLeftButton.classList.toggle("is-pressed", state.input.moveDir < 0);
  moveRightButton.classList.toggle("is-pressed", state.input.moveDir > 0);
}

function setMoveDir(dir) {
  if (state.input.moveDir === dir) {
    return;
  }

  state.input.moveDir = dir;
  if (state.running && !state.gameOver && dir !== 0) {
    state.chicken.vx += dir * 72;
  }
  syncMoveButtons();
}

function bindMoveButton(button, dir) {
  const start = (event) => {
    event.preventDefault();
    event.stopPropagation();
    if (event.pointerId !== undefined && button.setPointerCapture) {
      button.setPointerCapture(event.pointerId);
    }
    setMoveDir(dir);
  };

  const stop = (event) => {
    event.preventDefault();
    event.stopPropagation();
    if (state.input.moveDir === dir) {
      setMoveDir(0);
    }
  };

  button.addEventListener("pointerdown", start);
  button.addEventListener("pointerup", stop);
  button.addEventListener("pointercancel", stop);
  button.addEventListener("lostpointercapture", stop);
  button.addEventListener("pointerleave", (event) => {
    if ((event.buttons & 1) === 0 && state.input.moveDir === dir) {
      stop(event);
    }
  });
  button.addEventListener("touchstart", start, { passive: false });
  button.addEventListener("touchend", stop, { passive: false });
  button.addEventListener("touchcancel", stop, { passive: false });
}

window.cluckyStartStage = (stageId = state.selectedStage) => {
  unlockAudio();
  setSelectedStage(stageId);
  resetGame(stageId);
};
window.cluckyRestart = () => {
  unlockAudio();
  resetGame(state.selectedStage);
};
window.cluckyShowStages = () => {
  showStageMenu();
};

canvas.addEventListener("pointerdown", handlePress);
canvas.addEventListener("touchstart", handlePress, { passive: false });
canvas.addEventListener("click", handlePress);
bindDirectButtonAction(startButton, () => {
  unlockAudio();
  resetGame(state.selectedStage);
});

bindDirectButtonAction(restartButton, () => {
  unlockAudio();
  resetGame(state.selectedStage);
});

bindDirectButtonAction(menuButton, () => {
  showStageMenu();
});

stageButtons.forEach((button) => {
  bindDirectButtonAction(button, () => {
    const stageId = Number(button.dataset.stage);
    unlockAudio();
    setSelectedStage(stageId);
    resetGame(stageId);
  });
});

window.addEventListener("keydown", (event) => {
  if (event.code === "Space" || event.code === "ArrowUp") {
    event.preventDefault();
    flap();
  }

  if (event.code === "ArrowLeft" || event.code === "KeyA") {
    event.preventDefault();
    setMoveDir(-1);
  }

  if (event.code === "ArrowRight" || event.code === "KeyD") {
    event.preventDefault();
    setMoveDir(1);
  }
});

window.addEventListener("keyup", (event) => {
  if ((event.code === "ArrowLeft" || event.code === "KeyA") && state.input.moveDir < 0) {
    setMoveDir(0);
  }

  if ((event.code === "ArrowRight" || event.code === "KeyD") && state.input.moveDir > 0) {
    setMoveDir(0);
  }
});

bindMoveButton(moveLeftButton, -1);
bindMoveButton(moveRightButton, 1);

state.chicken = makeChicken();
syncMoveButtons();
syncTimeDisplay();
updateStageMenu();
draw();

</script>
</body>
