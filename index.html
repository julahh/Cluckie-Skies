<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#8ed8ff">
  <meta name="description" content="Clucky Skies is a whimsical farm arcade game built for phone-friendly play and easy sharing.">
  <title>Clucky Skies</title>
  <style>
:root {
  --sky-top: #8ed8ff;
  --sky-mid: #d6f3ff;
  --sky-bottom: #f8fbff;
  --grass: #74c95d;
  --grass-dark: #479c41;
  --soil: #8b5a2b;
  --hay: #f5cb4c;
  --hay-shadow: #d79e24;
  --panel: rgba(255, 252, 239, 0.88);
  --ink: #3d2a1d;
  --accent: #ff8d45;
  --cream: #fff6df;
  --body-font:
    "Avenir Next",
    "Segoe UI",
    "Helvetica Neue",
    Arial,
    sans-serif;
  --display-font:
    "Avenir Next Condensed",
    "Arial Rounded MT Bold",
    "Trebuchet MS",
    "Segoe UI",
    sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  font-family: var(--body-font);
  background:
    radial-gradient(circle at top, rgba(255, 250, 184, 0.7), transparent 28%),
    linear-gradient(180deg, #7ccfff 0%, #b8ebff 40%, #f2fbff 100%);
  color: var(--ink);
  overflow: hidden;
  -webkit-touch-callout: none;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 16px;
}

.game-frame {
  position: relative;
  width: min(100vw, 430px);
  height: min(100vh, 932px);
  border-radius: 34px;
  overflow: hidden;
  -webkit-touch-callout: none;
  border: 5px solid rgba(255, 255, 255, 0.55);
  box-shadow:
    0 24px 60px rgba(36, 86, 122, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.6);
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 75%);
}

.sky-backdrop {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.25), transparent 45%),
    linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 38%, var(--sky-bottom) 100%);
}

.sun,
.cloud,
.barn,
.windmill {
  position: absolute;
  pointer-events: none;
}

.sun {
  top: 60px;
  right: 44px;
  width: 104px;
  height: 104px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #fffbd5 0 22%, #ffd85e 48%, #ffb31f 100%);
  box-shadow: 0 0 60px rgba(255, 219, 99, 0.55);
}

.cloud {
  background: rgba(255, 255, 255, 0.88);
  border-radius: 999px;
  filter: drop-shadow(0 10px 12px rgba(111, 164, 199, 0.18));
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: inherit;
  border-radius: inherit;
}

.cloud-a {
  top: 104px;
  left: 18px;
  width: 112px;
  height: 34px;
  animation: drift 18s linear infinite;
}

.cloud-a::before {
  width: 40px;
  height: 40px;
  left: 15px;
  top: -18px;
}

.cloud-a::after {
  width: 50px;
  height: 50px;
  right: 12px;
  top: -22px;
}

.cloud-b {
  top: 196px;
  right: 38px;
  width: 140px;
  height: 38px;
  opacity: 0.92;
  animation: drift 22s linear infinite reverse;
}

.cloud-b::before {
  width: 55px;
  height: 55px;
  left: 24px;
  top: -20px;
}

.cloud-b::after {
  width: 45px;
  height: 45px;
  right: 18px;
  top: -14px;
}

.cloud-c {
  top: 310px;
  left: 60px;
  width: 86px;
  height: 28px;
  opacity: 0.76;
  animation: drift 20s linear infinite;
}

.cloud-c::before {
  width: 34px;
  height: 34px;
  left: 12px;
  top: -12px;
}

.cloud-c::after {
  width: 30px;
  height: 30px;
  right: 10px;
  top: -10px;
}

.barn {
  left: 32px;
  bottom: 112px;
  width: 98px;
  height: 84px;
  background: linear-gradient(180deg, #d94d37 0%, #b9372c 100%);
  border-radius: 12px 12px 0 0;
  box-shadow: 0 10px 22px rgba(106, 51, 35, 0.12);
}

.barn::before {
  content: "";
  position: absolute;
  left: -8px;
  top: -30px;
  width: 114px;
  height: 44px;
  background: #89311e;
  clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
}

.barn::after {
  content: "";
  position: absolute;
  left: 34px;
  bottom: 0;
  width: 30px;
  height: 44px;
  background: #fff5e0;
  border-radius: 12px 12px 0 0;
  box-shadow: inset 0 0 0 4px #db845d;
}

.windmill {
  right: 46px;
  bottom: 114px;
  width: 16px;
  height: 108px;
  background: linear-gradient(180deg, #e6ecf2, #abb7c1);
  border-radius: 8px;
}

.windmill::before,
.windmill::after {
  content: "";
  position: absolute;
}

.windmill::before {
  left: -33px;
  top: -14px;
  width: 82px;
  height: 82px;
  border-radius: 50%;
  background:
    linear-gradient(45deg, transparent 46%, #fff5eb 46% 54%, transparent 54%),
    linear-gradient(-45deg, transparent 46%, #fff5eb 46% 54%, transparent 54%);
  animation: spin 5s linear infinite;
}

.windmill::after {
  left: -7px;
  top: 17px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #ffb04a;
}

canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

.hud {
  position: absolute;
  top: max(18px, env(safe-area-inset-top));
  left: 18px;
  right: 18px;
  display: flex;
  justify-content: space-between;
  align-items: start;
  gap: 12px;
  pointer-events: none;
}

.hud > * {
  pointer-events: auto;
}

.hud-actions {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.move-pad {
  position: absolute;
  left: 18px;
  bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
  display: flex;
  gap: 12px;
  z-index: 3;
}



.move-button {
  width: 64px;
  height: 64px;
  border: 0;
  border-radius: 20px;
  display: grid;
  place-items: center;
  padding: 0;
  font-family: var(--display-font);
  font-size: 1.85rem;
  line-height: 1;
  color: #fff8ef;
  background:
    linear-gradient(180deg, rgba(255, 246, 223, 0.26), rgba(255, 255, 255, 0.08)),
    linear-gradient(180deg, #ffad68 0%, #ef7a37 100%);
  box-shadow:
    0 14px 24px rgba(125, 82, 34, 0.24),
    inset 0 1px 0 rgba(255, 255, 255, 0.5);
  touch-action: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 40ms linear, box-shadow 40ms linear;
}

.move-button:active,
.move-button.is-pressed {
  transform: translateY(2px) scale(0.98);
  box-shadow:
    0 8px 16px rgba(125, 82, 34, 0.24),
    inset 0 2px 0 rgba(255, 255, 255, 0.35);
}

.badge {
  min-width: 90px;
  padding: 10px 14px;
  border-radius: 18px;
  background: rgba(255, 250, 232, 0.88);
  box-shadow: 0 12px 24px rgba(98, 133, 160, 0.14);
  text-align: center;
}

.label {
  display: block;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: rgba(61, 42, 29, 0.7);
}

.badge strong {
  display: block;
  font-family: var(--display-font);
  font-size: 2rem;
  line-height: 1;
}

.menu-button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  margin-top: 0;
  width: auto;
  min-width: 92px;
  padding: 11px 16px;
  border-radius: 18px;
  font-size: 0.95rem;
  box-shadow: 0 12px 20px rgba(84, 121, 52, 0.22);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.08)),
    linear-gradient(180deg, #8fcf6a 0%, #5aa63b 100%);
}

.menu-button-secondary {
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.26), rgba(255, 255, 255, 0.08)),
    linear-gradient(180deg, #72c4ff 0%, #2f88dd 100%);
  box-shadow: 0 12px 20px rgba(45, 110, 182, 0.22);
}

.badge-time strong {
  font-size: 1.55rem;
}

.overlay {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 24px;
  background: linear-gradient(180deg, rgba(90, 179, 247, 0.2), rgba(255, 255, 255, 0.22));
  opacity: 0;
  pointer-events: none;
  transition: opacity 220ms ease;
}

.overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.panel {
  width: min(100%, 340px);
  padding: 24px 22px 20px;
  border-radius: 28px;
  background: var(--panel);
  backdrop-filter: blur(10px);
  box-shadow: 0 24px 48px rgba(50, 94, 122, 0.18);
  text-align: center;
}

.eyebrow {
  margin: 0 0 4px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 0.72rem;
  color: #816444;
}

h1 {
  margin: 0;
  font-family: var(--display-font);
  font-size: 3rem;
  line-height: 0.95;
}

.intro,
.subcopy {
  margin: 14px 0 0;
  font-size: 1rem;
  line-height: 1.45;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.controls span {
  padding: 8px 12px;
  border-radius: 999px;
  background: rgba(255, 190, 86, 0.25);
  font-weight: 800;
}

.stage-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 18px;
}

.stage-option {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  margin-top: 0;
  width: 100%;
  min-height: 62px;
  padding: 12px 10px;
  border-radius: 18px;
  font-family: var(--display-font);
  font-size: 0.98rem;
  line-height: 1.1;
  color: #4b2f1f;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.5), rgba(255, 251, 240, 0.74)),
    linear-gradient(180deg, #fff0cf 0%, #f5d79e 100%);
  box-shadow:
    0 10px 18px rgba(131, 95, 42, 0.16),
    inset 0 1px 0 rgba(255, 255, 255, 0.75);
}

.stage-option.is-selected {
  color: #fffaf1;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.04)),
    linear-gradient(180deg, #ffac68 0%, #ec7b35 100%);
  box-shadow:
    0 14px 24px rgba(192, 111, 44, 0.28),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

button {
  margin-top: 20px;
  border: 0;
  border-radius: 16px;
  padding: 14px 20px;
  width: 100%;
  font: inherit;
  font-weight: 900;
  font-size: 1.05rem;
  color: #fff8ef;
  background: linear-gradient(180deg, #ff9b55 0%, #f16f33 100%);
  box-shadow: 0 12px 20px rgba(241, 111, 51, 0.3);
}

button:active {
  transform: translateY(1px);
}



.panel-credit {
  margin: 14px 0 0;
  font-size: 0.78rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(97, 73, 48, 0.72);
}

@keyframes drift {
  from {
    transform: translateX(-10px);
  }

  50% {
    transform: translateX(12px);
  }

  to {
    transform: translateX(-10px);
  }
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

@media (max-width: 480px) {
  .app-shell {
    padding: 0;
  }

  .game-frame {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    border: 0;
  }

  .move-pad {
    left: 14px;
    bottom: max(18px, calc(env(safe-area-inset-bottom) + 10px));
    gap: 10px;
  }

  .move-button {
    width: 58px;
    height: 58px;
    border-radius: 18px;
    font-size: 1.6rem;
  }

  .stage-grid {
    grid-template-columns: 1fr;
  }

  .menu-button {
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
    min-width: 82px;
    padding: 10px 14px;
    font-size: 0.88rem;
  }

  .hud-actions {
    gap: 8px;
  }

  .badge-time {
    min-width: 76px;
    padding: 10px 10px;
  }

  .badge-time strong {
    font-size: 1.3rem;
  }
}

</style>
</head>
<body>
  <main class="app-shell">
    <section class="game-frame">
      <div class="sky-backdrop">
        <div class="sun"></div>
        <div class="cloud cloud-a"></div>
        <div class="cloud cloud-b"></div>
        <div class="cloud cloud-c"></div>
        <div class="barn"></div>
        <div class="windmill"></div>
      </div>

      <canvas id="game" width="430" height="932" aria-label="Clucky Skies game"></canvas>

      <div class="hud">
        <div class="badge">
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="hud-actions">
          <div class="badge badge-time">
            <span class="label">Time</span>
            <strong id="timeLeft">10:00</strong>
          </div>
          <button id="restartButton" class="menu-button menu-button-secondary" type="button" onclick="window.cluckyRestart()">Restart</button>
          <button id="menuButton" class="menu-button" type="button" onclick="window.cluckyShowStages()">Stages</button>
        </div>
        <div class="badge">
          <span class="label">Best</span>
          <strong id="best">0</strong>
        </div>
      </div>

      <div class="move-pad" aria-label="Horizontal movement controls">
        <button id="moveLeft" class="move-button" type="button" aria-label="Move left">&larr;</button>
        <button id="moveRight" class="move-button" type="button" aria-label="Move right">&rarr;</button>
      </div>


      <div class="overlay visible" id="overlay">
        <div class="panel">
          <p class="eyebrow" id="panelEyebrow">Pick A Farm Flight</p>
          <h1>Clucky Skies</h1>
          <p class="intro" id="panelIntro">
            Pick any stage below and jump straight into that themed run with your goofy-eyed chicken.
          </p>
          <div class="stage-grid" id="stageGrid">
            <button class="stage-option is-selected" type="button" data-stage="1" onclick="window.cluckyStartStage(1)">Blue Sky Farm</button>
            <button class="stage-option" type="button" data-stage="2" onclick="window.cluckyStartStage(2)">Thunderstorm Hail</button>
            <button class="stage-option" type="button" data-stage="3" onclick="window.cluckyStartStage(3)">Autumn Leaves</button>
            <button class="stage-option" type="button" data-stage="4" onclick="window.cluckyStartStage(4)">Christmas Snow</button>
            <button class="stage-option" type="button" data-stage="5" onclick="window.cluckyStartStage(5)">Shamrock Clover</button>
            <button class="stage-option" type="button" data-stage="6" onclick="window.cluckyStartStage(6)">Night UFO Farm</button>
          </div>
          <div class="controls">
            <span>Tap</span>
            <span>Move pad</span>
            <span>Press space</span>
          </div>
          <p class="subcopy" id="panelSubcopy">Keep Clucky clear of hay bales and the ground while scooping up point drops.</p>
          <button id="startButton" type="button" onclick="window.cluckyStartStage()">Play Selected Stage</button>
          <p class="panel-credit">@2026 Tauren Games Studios</p>
        </div>
      </div>
    </section>
  </main>

  <script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const overlay = document.getElementById("overlay");
const startButton = document.getElementById("startButton");
const menuButton = document.getElementById("menuButton");
const restartButton = document.getElementById("restartButton");
const scoreEl = document.getElementById("score");
const bestEl = document.getElementById("best");
const timeEl = document.getElementById("timeLeft");
const moveLeftButton = document.getElementById("moveLeft");
const moveRightButton = document.getElementById("moveRight");
const panelEyebrow = document.getElementById("panelEyebrow");
const panelIntro = document.getElementById("panelIntro");
const panelSubcopy = document.getElementById("panelSubcopy");
const stageButtons = [...document.querySelectorAll(".stage-option")];

const DPR = Math.min(window.devicePixelRatio || 1, 2);
const BEST_KEY = "clucky-skies-best";
const AudioContextClass = window.AudioContext || window.webkitAudioContext;
const TOTAL_STAGES = 6;
const ENDLESS_MODE = true;
const STAGES = {
  1: {
    name: "Blue Sky Farm",
    eyebrow: "Sunny Barnyard Run",
    intro: "Classic blue-sky flight with egg point drops and bright farm haystacks.",
    subcopy: "Keep Clucky clear of hay bales and the ground while scooping up eggs for bonus points.",
    action: "Play Blue Sky Farm",
  },
  2: {
    name: "Thunderstorm Hail",
    eyebrow: "Storm Chase Stage",
    intro: "Dark clouds, lightning flashes, and chunky hail drops rolling through the haystack lanes.",
    subcopy: "Hold your line through the storm and collect hail chunks without clipping the soaked hay.",
    action: "Play Thunderstorm Hail",
  },
  3: {
    name: "Autumn Leaves",
    eyebrow: "Harvest Wind Run",
    intro: "Warm fall skies, harvest-toned haystacks, and drifting leaves that shower down as point drops.",
    subcopy: "Guide Clucky through the tighter openings and collect the autumn leaves for extra score.",
    action: "Play Autumn Leaves",
  },
  4: {
    name: "Christmas Snow",
    eyebrow: "Holiday Flight",
    intro: "A snowy Christmas farm with frosty haystacks, snowball drops, and festive chicken gear.",
    subcopy: "Guide the scarf-wearing chicken through the winter course and gather snowball points.",
    action: "Play Christmas Snow",
  },
  5: {
    name: "Shamrock Clover",
    eyebrow: "Lucky Clover Stage",
    intro: "Fresh green skies and shamrock scenery with gold coins raining down through the farm path.",
    subcopy: "Stay centered through the shamrock hay lanes and scoop up gold coins for extra points.",
    action: "Play Shamrock Clover",
  },
  6: {
    name: "Night UFO Farm",
    eyebrow: "Moonlit Alien Run",
    intro: "A midnight farm where the chicken pilots a glowing green UFO past neon-tinted night haystacks.",
    subcopy: "Glide through the moonlit gaps and collect meteor drops without scraping the alien hay towers.",
    action: "Play Night UFO Farm",
  },
};

const audioState = {
  unlocked: false,
  ctx: null,
  enabled: Boolean(AudioContextClass),
  rainSource: null,
  rainGain: null,
};

function ensureAudio() {
  if (!audioState.enabled) {
    return null;
  }

  if (!audioState.ctx) {
    audioState.ctx = new AudioContextClass();
  }

  if (audioState.ctx.state === "suspended") {
    audioState.ctx.resume();
  }

  return audioState.ctx;
}

function makeGain(ctx, value, time) {
  const gain = ctx.createGain();
  gain.gain.setValueAtTime(value, time);
  gain.connect(ctx.destination);
  return gain;
}

function ensureRainAudio() {
  const ctx = audioState.ctx;
  if (!ctx) {
    return null;
  }

  if (!audioState.rainSource) {
    const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const channel = noiseBuffer.getChannelData(0);
    for (let i = 0; i < channel.length; i += 1) {
      channel[i] = (Math.random() * 2 - 1) * 0.8;
    }

    const source = ctx.createBufferSource();
    source.buffer = noiseBuffer;
    source.loop = true;

    const highpass = ctx.createBiquadFilter();
    highpass.type = "highpass";
    highpass.frequency.value = 380;

    const bandpass = ctx.createBiquadFilter();
    bandpass.type = "bandpass";
    bandpass.frequency.value = 1300;
    bandpass.Q.value = 0.32;

    const gain = ctx.createGain();
    gain.gain.value = 0.0001;

    source.connect(highpass);
    highpass.connect(bandpass);
    bandpass.connect(gain);
    gain.connect(ctx.destination);
    source.start();

    audioState.rainSource = source;
    audioState.rainGain = gain;
  }

  return ctx;
}


function unlockAudio() {
  const ctx = ensureAudio();
  if (!ctx) {
    return false;
  }

  audioState.unlocked = true;
  return true;
}

function syncRainAudio() {
  const ctx = ensureRainAudio();
  if (!ctx || !audioState.rainGain) {
    return;
  }

  const target = state.running && state.stage === 2 && !state.gameOver ? 0.018 : 0.0001;
  audioState.rainGain.gain.cancelScheduledValues(ctx.currentTime);
  audioState.rainGain.gain.setTargetAtTime(target, ctx.currentTime, 0.2);
}

function playFlapCluck() {
  const ctx = ensureAudio();
  if (!ctx) {
    return;
  }

  ensureRainAudio();

  const start = ctx.currentTime;
  const gain = makeGain(ctx, 0.0001, start);

  const oscA = ctx.createOscillator();
  oscA.type = "square";
  oscA.frequency.setValueAtTime(760 + Math.random() * 80, start);
  oscA.frequency.exponentialRampToValueAtTime(410 + Math.random() * 30, start + 0.08);
  oscA.connect(gain);

  const oscB = ctx.createOscillator();
  oscB.type = "triangle";
  oscB.frequency.setValueAtTime(520 + Math.random() * 50, start);
  oscB.frequency.exponentialRampToValueAtTime(220, start + 0.11);
  oscB.connect(gain);

  gain.gain.exponentialRampToValueAtTime(0.045, start + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.15);

  oscA.start(start);
  oscB.start(start + 0.01);
  oscA.stop(start + 0.15);
  oscB.stop(start + 0.15);
}

function playPassDing() {
  const ctx = ensureAudio();
  if (!ctx) {
    return;
  }

  const start = ctx.currentTime;
  const gain = makeGain(ctx, 0.0001, start);

  const oscA = ctx.createOscillator();
  oscA.type = "square";
  oscA.frequency.setValueAtTime(740, start);
  oscA.frequency.exponentialRampToValueAtTime(988, start + 0.055);
  oscA.connect(gain);

  const oscB = ctx.createOscillator();
  oscB.type = "triangle";
  oscB.frequency.setValueAtTime(494, start);
  oscB.frequency.exponentialRampToValueAtTime(740, start + 0.06);
  oscB.connect(gain);

  gain.gain.exponentialRampToValueAtTime(0.03, start + 0.006);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.1);

  oscA.start(start);
  oscB.start(start + 0.002);
  oscA.stop(start + 0.1);
  oscB.stop(start + 0.085);
}

function playHolidayPassBell() {
  const ctx = ensureAudio();
  if (!ctx) {
    return;
  }

  const start = ctx.currentTime;
  const gain = makeGain(ctx, 0.0001, start);

  const oscA = ctx.createOscillator();
  oscA.type = "sine";
  oscA.frequency.setValueAtTime(988, start);
  oscA.frequency.exponentialRampToValueAtTime(1318, start + 0.08);
  oscA.connect(gain);

  const oscB = ctx.createOscillator();
  oscB.type = "triangle";
  oscB.frequency.setValueAtTime(740, start + 0.008);
  oscB.frequency.exponentialRampToValueAtTime(988, start + 0.09);
  oscB.connect(gain);

  gain.gain.exponentialRampToValueAtTime(0.05, start + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.16);

  oscA.start(start);
  oscB.start(start + 0.008);
  oscA.stop(start + 0.16);
  oscB.stop(start + 0.14);
}
function playNightPassDing() {
  const ctx = ensureAudio();
  if (!ctx) {
    return;
  }

  const start = ctx.currentTime;
  const gain = makeGain(ctx, 0.0001, start);

  const osc = ctx.createOscillator();
  osc.type = "sawtooth";
  osc.frequency.setValueAtTime(1880, start);
  osc.frequency.exponentialRampToValueAtTime(320, start + 0.11);

  const filter = ctx.createBiquadFilter();
  filter.type = "bandpass";
  filter.frequency.setValueAtTime(2100, start);
  filter.Q.setValueAtTime(1.9, start);

  osc.connect(filter);
  filter.connect(gain);

  gain.gain.exponentialRampToValueAtTime(0.045, start + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.13);

  osc.start(start);
  osc.stop(start + 0.13);
}
function playCrashCluck() {
  const ctx = ensureAudio();
  if (!ctx) {
    return;
  }

  const start = ctx.currentTime;
  const master = makeGain(ctx, 0.0001, start);

  const oscA = ctx.createOscillator();
  oscA.type = "sawtooth";
  oscA.frequency.setValueAtTime(320, start);
  oscA.frequency.exponentialRampToValueAtTime(120, start + 0.22);
  oscA.connect(master);

  const oscB = ctx.createOscillator();
  oscB.type = "square";
  oscB.frequency.setValueAtTime(180, start + 0.02);
  oscB.frequency.exponentialRampToValueAtTime(90, start + 0.24);
  oscB.connect(master);

  const noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.18), ctx.sampleRate);
  const channel = noiseBuffer.getChannelData(0);
  for (let i = 0; i < channel.length; i += 1) {
    channel[i] = (Math.random() * 2 - 1) * (1 - i / channel.length);
  }

  const noise = ctx.createBufferSource();
  noise.buffer = noiseBuffer;
  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = "bandpass";
  noiseFilter.frequency.setValueAtTime(900, start);
  noiseFilter.Q.setValueAtTime(0.8, start);
  noise.connect(noiseFilter);
  noiseFilter.connect(master);

  master.gain.exponentialRampToValueAtTime(0.08, start + 0.01);
  master.gain.exponentialRampToValueAtTime(0.0001, start + 0.26);

  oscA.start(start);
  oscB.start(start + 0.02);
  noise.start(start);
  oscA.stop(start + 0.26);
  oscB.stop(start + 0.26);
  noise.stop(start + 0.18);
}

function intersectsCircleRect(circle, rect) {
  const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
  const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
  const dx = circle.x - closestX;
  const dy = circle.y - closestY;
  return dx * dx + dy * dy <= circle.radius * circle.radius;
}

function update(dt) {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const floorHeight = 118;
  const speed = 148 + Math.min(state.score * 2.4, 24);

  state.time += dt;
  state.stageFlash = Math.max(0, state.stageFlash - dt);
  state.lightningFlash = Math.max(0, state.lightningFlash - dt * 1.8);

  const chicken = state.chicken;
  chicken.bob += dt * 5;
  chicken.wingPhase += dt * 14;

  if (state.running && !state.gameOver) {
    state.distance += speed * dt;
    state.stageTimer += dt;
    state.pipeTimer += dt;
    state.eggTimer += dt;
    state.rainTimer += dt;
    state.leafTimer += dt;
    state.snowTimer += dt;
    state.cloverTimer += dt;
    state.meteorTimer += dt;
    syncTimeDisplay();

    const minX = 36;
    const maxX = w - 36;
    chicken.vx += state.input.moveDir * 980 * dt;
    chicken.vx *= state.input.moveDir === 0 ? 0.8 : 0.92;
    chicken.vx = Math.max(-240, Math.min(240, chicken.vx));
    chicken.x = Math.max(minX, Math.min(maxX, chicken.x + chicken.vx * dt));
    if ((chicken.x === minX && chicken.vx < 0) || (chicken.x === maxX && chicken.vx > 0)) {
      chicken.vx = 0;
    }

    chicken.vy += 890 * dt;
    chicken.vy = Math.min(chicken.vy, 520);
    chicken.y += chicken.vy * dt;
    chicken.tilt = Math.max(-0.72, Math.min(1.02, chicken.vy / 445 + chicken.vx / 520));

    if (state.pipeTimer >= 2.08) {
      state.pipeTimer = 0;
      spawnHaystack();
    }

    if (state.stage === 1 && state.eggTimer >= state.nextEggIn) {
      state.eggTimer = 0;
      state.nextEggIn = 2.8 + Math.random() * 1.4;
      spawnEgg();
    }

    if (state.stage === 2 && state.rainTimer >= state.nextRainIn && state.raindrops.length < 2) {
      state.rainTimer = 0;
      state.nextRainIn = 1.7 + Math.random() * 1.1;
      spawnRaindrop();
    }

    if (state.stage === 3 && state.leafTimer >= state.nextLeafIn && state.leaves.length < 3) {
      state.leafTimer = 0;
      state.nextLeafIn = 1.5 + Math.random() * 1.1;
      spawnLeaf();
    }

    if (state.stage === 4 && state.snowTimer >= state.nextSnowIn && state.snowballs.length < 3) {
      state.snowTimer = 0;
      state.nextSnowIn = 1.5 + Math.random() * 1;
      spawnSnowball();
    }

    if (state.stage === 5 && state.cloverTimer >= state.nextCloverIn && state.clovers.length < 3) {
      state.cloverTimer = 0;
      state.nextCloverIn = 1.4 + Math.random() * 1;
      spawnClover();
    }

    if (state.stage === 6 && state.meteorTimer >= state.nextMeteorIn && state.meteors.length < 3) {
      state.meteorTimer = 0;
      state.nextMeteorIn = 1.35 + Math.random() * 0.9;
      spawnMeteor();
    }

    for (const haystack of state.haystacks) {
      haystack.x -= speed * dt;

      if (!haystack.passed && haystack.x + haystack.width < chicken.x) {
        haystack.passed = true;
        state.score += 1;
        scoreEl.textContent = String(state.score);
        if (state.stage === 6) {
          playNightPassDing();
        } else if (state.stage === 5) {
          playHolidayPassBell();
        } else {
          playPassDing();
        }
      }

      const hitbox = {
        x: chicken.x - chicken.width * 0.3,
        y: chicken.y - chicken.height * 0.22,
        width: chicken.width * 0.78,
        height: chicken.height * 0.7,
      };

      const topRect = { x: haystack.x, y: 0, width: haystack.width, height: haystack.gapY };
      const bottomRect = {
        x: haystack.x,
        y: haystack.gapY + haystack.gap,
        width: haystack.width,
        height: h - floorHeight - (haystack.gapY + haystack.gap),
      };

      const overlapTop =
        hitbox.x < topRect.x + topRect.width &&
        hitbox.x + hitbox.width > topRect.x &&
        hitbox.y < topRect.y + topRect.height &&
        hitbox.y + hitbox.height > topRect.y;
      const overlapBottom =
        hitbox.x < bottomRect.x + bottomRect.width &&
        hitbox.x + hitbox.width > bottomRect.x &&
        hitbox.y < bottomRect.y + bottomRect.height &&
        hitbox.y + hitbox.height > bottomRect.y;

      if (overlapTop || overlapBottom) {
        hitGameOver();
      }
    }

    state.haystacks = state.haystacks.filter((haystack) => haystack.x + haystack.width > -40);

    for (const egg of state.eggs) {
      egg.y += egg.vy * dt;
      egg.x += Math.sin(state.time * 2.4 + egg.phase) * egg.drift * dt;
      egg.rot += dt * 1.8;

      const circle = { x: egg.x, y: egg.y, radius: egg.radius * 0.8 };
      const chickenRect = {
        x: chicken.x - chicken.width * 0.18,
        y: chicken.y - chicken.height * 0.1,
        width: chicken.width * 0.62,
        height: chicken.height * 0.7,
      };

      if (intersectsCircleRect(circle, chickenRect)) {
        egg.popped = true;
        state.score += egg.value;
        scoreEl.textContent = String(state.score);

        for (let i = 0; i < 8; i += 1) {
          spawnFeather(
            egg.x - 6 + Math.random() * 12,
            egg.y - 6 + Math.random() * 12,
            -80 + Math.random() * 160,
            -90 + Math.random() * 140,
            0.35 + Math.random() * 0.4
          );
        }
      }
    }

    state.eggs = state.eggs.filter((egg) => !egg.popped && egg.y - egg.radius < h - floorHeight + 10);

    for (const raindrop of state.raindrops) {
      raindrop.y += raindrop.vy * dt;
      raindrop.x += Math.sin(state.time * 2.1 + raindrop.phase) * raindrop.drift * dt;
      raindrop.spin += dt * 4.2;

      const circle = { x: raindrop.x, y: raindrop.y, radius: raindrop.radius * 0.82 };
      const chickenRect = {
        x: chicken.x - chicken.width * 0.18,
        y: chicken.y - chicken.height * 0.1,
        width: chicken.width * 0.62,
        height: chicken.height * 0.7,
      };

      if (intersectsCircleRect(circle, chickenRect)) {
        raindrop.popped = true;
        state.score += raindrop.value;
        scoreEl.textContent = String(state.score);

        for (let i = 0; i < 8; i += 1) {
          spawnFeather(
            raindrop.x - 6 + Math.random() * 12,
            raindrop.y - 6 + Math.random() * 12,
            -80 + Math.random() * 160,
            -90 + Math.random() * 140,
            0.35 + Math.random() * 0.4
          );
        }
      }
    }

    state.raindrops = state.raindrops.filter(
      (raindrop) => !raindrop.popped && raindrop.y - raindrop.radius < h - floorHeight + 10
    );

    for (const leaf of state.leaves) {
      leaf.y += leaf.vy * dt;
      leaf.x += Math.sin(state.time * 2.6 + leaf.phase) * leaf.drift * dt;
      leaf.spin += dt * 3.8;

      const circle = { x: leaf.x, y: leaf.y, radius: leaf.radius * 0.78 };
      const chickenRect = {
        x: chicken.x - chicken.width * 0.18,
        y: chicken.y - chicken.height * 0.1,
        width: chicken.width * 0.62,
        height: chicken.height * 0.7,
      };

      if (intersectsCircleRect(circle, chickenRect)) {
        leaf.popped = true;
        state.score += leaf.value;
        scoreEl.textContent = String(state.score);

        for (let i = 0; i < 8; i += 1) {
          spawnFeather(
            leaf.x - 6 + Math.random() * 12,
            leaf.y - 6 + Math.random() * 12,
            -80 + Math.random() * 160,
            -90 + Math.random() * 140,
            0.35 + Math.random() * 0.4
          );
        }
      }
    }

    state.leaves = state.leaves.filter((leaf) => !leaf.popped && leaf.y - leaf.radius < h - floorHeight + 10);

    for (const snowball of state.snowballs) {
      snowball.y += snowball.vy * dt;
      snowball.x += Math.sin(state.time * 2.3 + snowball.phase) * snowball.drift * dt;
      snowball.rot += dt * 2.4;

      const circle = { x: snowball.x, y: snowball.y, radius: snowball.radius * 0.82 };
      const chickenRect = {
        x: chicken.x - chicken.width * 0.18,
        y: chicken.y - chicken.height * 0.1,
        width: chicken.width * 0.62,
        height: chicken.height * 0.7,
      };

      if (intersectsCircleRect(circle, chickenRect)) {
        snowball.popped = true;
        state.score += snowball.value;
        scoreEl.textContent = String(state.score);

        for (let i = 0; i < 8; i += 1) {
          spawnFeather(
            snowball.x - 6 + Math.random() * 12,
            snowball.y - 6 + Math.random() * 12,
            -80 + Math.random() * 160,
            -90 + Math.random() * 140,
            0.35 + Math.random() * 0.4
          );
        }
      }
    }

    state.snowballs = state.snowballs.filter(
      (snowball) => !snowball.popped && snowball.y - snowball.radius < h - floorHeight + 10
    );

    for (const clover of state.clovers) {
      clover.y += clover.vy * dt;
      clover.x += Math.sin(state.time * 2.5 + clover.phase) * clover.drift * dt;
      clover.spin += dt * 3.2;

      const circle = { x: clover.x, y: clover.y, radius: clover.radius * 0.82 };
      const chickenRect = {
        x: chicken.x - chicken.width * 0.18,
        y: chicken.y - chicken.height * 0.1,
        width: chicken.width * 0.62,
        height: chicken.height * 0.7,
      };

      if (intersectsCircleRect(circle, chickenRect)) {
        clover.popped = true;
        state.score += clover.value;
        scoreEl.textContent = String(state.score);

        for (let i = 0; i < 8; i += 1) {
          spawnFeather(
            clover.x - 6 + Math.random() * 12,
            clover.y - 6 + Math.random() * 12,
            -80 + Math.random() * 160,
            -90 + Math.random() * 140,
            0.35 + Math.random() * 0.4
          );
        }
      }
    }

    state.clovers = state.clovers.filter(
      (clover) => !clover.popped && clover.y - clover.radius < h - floorHeight + 10
    );

    for (const meteor of state.meteors) {
      meteor.y += meteor.vy * dt;
      meteor.x += Math.sin(state.time * 2.8 + meteor.phase) * meteor.drift * dt;
      meteor.rot += dt * 3.6;

      const circle = { x: meteor.x, y: meteor.y, radius: meteor.radius * 0.82 };
      const chickenRect = {
        x: chicken.x - chicken.width * 0.18,
        y: chicken.y - chicken.height * 0.1,
        width: chicken.width * 0.62,
        height: chicken.height * 0.7,
      };

      if (intersectsCircleRect(circle, chickenRect)) {
        meteor.popped = true;
        state.score += meteor.value;
        scoreEl.textContent = String(state.score);

        for (let i = 0; i < 8; i += 1) {
          spawnFeather(
            meteor.x - 6 + Math.random() * 12,
            meteor.y - 6 + Math.random() * 12,
            -80 + Math.random() * 160,
            -90 + Math.random() * 140,
            0.35 + Math.random() * 0.4
          );
        }
      }
    }

    state.meteors = state.meteors.filter(
      (meteor) => !meteor.popped && meteor.y - meteor.radius < h - floorHeight + 10
    );

    if (state.stage === 2 && Math.random() < 0.005) {
      state.lightningFlash = 0.9 + Math.random() * 0.5;
    }

    if (chicken.y + chicken.height * 0.45 >= h - floorHeight || chicken.y <= 26) {
      hitGameOver();
    }

    if (Math.random() < 0.2) {
      spawnFeather(
        chicken.x - 4 + Math.random() * 12,
        chicken.y + 8 + Math.random() * 12,
        -120 - Math.random() * 60,
        30 + Math.random() * 80,
        0.45 + Math.random() * 0.6
      );
    }
  } else if (!state.gameOver) {
    chicken.vx *= 0.84;
    chicken.x = Math.max(36, Math.min(w - 36, chicken.x + chicken.vx * dt));
    chicken.y += Math.sin(state.time * 2.6) * 0.45;
    chicken.tilt = Math.sin(state.time * 2.2) * 0.08;
  } else {
    chicken.vx *= 0.88;
    chicken.x = Math.max(36, Math.min(w - 36, chicken.x + chicken.vx * dt));
    chicken.vy += 1040 * dt;
    chicken.vy = Math.min(chicken.vy, 640);
    chicken.y = Math.min(chicken.y + chicken.vy * dt, h - floorHeight - 24);
    chicken.tilt = Math.min(1.25, chicken.tilt + dt * 2.3);
  }

  syncRainAudio();

  for (const feather of state.feathers) {
    feather.life -= dt;
    feather.x += feather.vx * dt;
    feather.y += feather.vy * dt;
    feather.vy += 260 * dt;
    feather.spin += dt * 6;
  }

  state.feathers = state.feathers.filter((feather) => feather.life > 0);
}

function roundedRectPath(x, y, width, height, radius) {
  const r = Math.min(radius, width / 2, height / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + width - r, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + r);
  ctx.lineTo(x + width, y + height - r);
  ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
  ctx.lineTo(x + r, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawBackground() {
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const floorHeight = 118;
  const horizon = h - floorHeight;

  ctx.clearRect(0, 0, w, h);
  if (state.stage === 1) {
    const hillOffset = (state.distance * 0.15) % w;
    ctx.fillStyle = "#8ed373";
    for (let i = -1; i < 3; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * w - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.18 - hillOffset, horizon - 70, i * w + w * 0.42 - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.62 - hillOffset, horizon - 62, i * w + w - hillOffset, horizon);
      ctx.lineTo(i * w + w - hillOffset, h);
      ctx.lineTo(i * w - hillOffset, h);
      ctx.closePath();
      ctx.fill();
    }

    const stripeOffset = (state.distance * 0.6) % 36;
    ctx.fillStyle = "#64b84d";
    ctx.fillRect(0, horizon, w, floorHeight);

    for (let x = -36; x < w + 36; x += 36) {
      ctx.beginPath();
      ctx.moveTo(x - stripeOffset, horizon + 6);
      ctx.lineTo(x + 12 - stripeOffset, h);
      ctx.lineTo(x + 22 - stripeOffset, h);
      ctx.lineTo(x + 8 - stripeOffset, horizon + 6);
      ctx.closePath();
      ctx.fillStyle = "rgba(71, 156, 65, 0.55)";
      ctx.fill();
    }

    ctx.fillStyle = "#8c5b2f";
    ctx.fillRect(0, h - 26, w, 26);
    return;
  }

  if (state.stage === 2) {
    const stormGradient = ctx.createLinearGradient(0, 0, 0, h);
    stormGradient.addColorStop(0, "#35485a");
    stormGradient.addColorStop(0.45, "#5d7386");
    stormGradient.addColorStop(1, "#9aa8b3");
    ctx.fillStyle = stormGradient;
    ctx.fillRect(0, 0, w, h);

    const cloudBands = [72, 130, 188];
    for (let i = 0; i < cloudBands.length; i += 1) {
      const y = cloudBands[i];
      const offset = (state.distance * (0.1 + i * 0.03)) % (w + 120);
      ctx.fillStyle = `rgba(35, 48, 61, ${0.34 + i * 0.08})`;
      for (let x = -140; x < w + 140; x += 140) {
        ctx.beginPath();
        ctx.ellipse(x - offset, y, 88, 26, 0, 0, Math.PI * 2);
        ctx.ellipse(x + 42 - offset, y + 8, 92, 28, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const hillOffset = (state.distance * 0.1) % w;
    ctx.fillStyle = "#6f8e72";
    for (let i = -1; i < 3; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * w - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.18 - hillOffset, horizon - 55, i * w + w * 0.42 - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.62 - hillOffset, horizon - 48, i * w + w - hillOffset, horizon);
      ctx.lineTo(i * w + w - hillOffset, h);
      ctx.lineTo(i * w - hillOffset, h);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "#5d7f66";
    ctx.fillRect(0, horizon, w, floorHeight);

    ctx.fillStyle = "rgba(174, 212, 228, 0.28)";
    for (let x = 10; x < w; x += 66) {
      ctx.beginPath();
      ctx.ellipse(x + Math.sin(state.time * 1.8 + x * 0.1) * 6, horizon + 46, 20, 6, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.strokeStyle = "rgba(214, 231, 243, 0.12)";
    ctx.lineWidth = 2;
    for (let i = 0; i < 42; i += 1) {
      const x = (i * 18 + state.time * 120) % (w + 60) - 30;
      const y = (i * 23) % horizon;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - 10, y + 24);
      ctx.stroke();
    }

    if (state.lightningFlash > 0) {
      ctx.fillStyle = `rgba(242, 248, 255, ${Math.min(0.24, state.lightningFlash * 0.22)})`;
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = `rgba(244, 251, 255, ${Math.min(0.7, state.lightningFlash * 0.55)})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      const boltX = w * 0.68;
      ctx.moveTo(boltX, 36);
      ctx.lineTo(boltX - 20, 120);
      ctx.lineTo(boltX + 8, 120);
      ctx.lineTo(boltX - 26, 212);
      ctx.lineTo(boltX + 18, 212);
      ctx.stroke();
    }

    ctx.fillStyle = "#6a5746";
    ctx.fillRect(0, h - 26, w, 26);
    return;
  }

  if (state.stage === 4) {
    const winterGradient = ctx.createLinearGradient(0, 0, 0, h);
    winterGradient.addColorStop(0, "#9fd7ff");
    winterGradient.addColorStop(0.42, "#dff4ff");
    winterGradient.addColorStop(1, "#f7fbff");
    ctx.fillStyle = winterGradient;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(w - 78, 92, 42, 0, Math.PI * 2);
    ctx.fill();

    const hillOffset = (state.distance * 0.1) % w;
    ctx.fillStyle = "#d7edf8";
    for (let i = -1; i < 3; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * w - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.18 - hillOffset, horizon - 60, i * w + w * 0.42 - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.62 - hillOffset, horizon - 52, i * w + w - hillOffset, horizon);
      ctx.lineTo(i * w + w - hillOffset, h);
      ctx.lineTo(i * w - hillOffset, h);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "#eef7fb";
    ctx.fillRect(0, horizon, w, floorHeight);

    const treeXs = [46, 106, w - 90];
    treeXs.forEach((xPos, index) => {
      ctx.fillStyle = "#6a482d";
      ctx.fillRect(xPos + 10, horizon - 52, 12, 52);
      const topY = horizon - 90 - index * 4;
      ["#2f8f54", "#3aa867", "#4cc57a"].forEach((color, level) => {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(xPos - level * 6, topY + level * 18);
        ctx.lineTo(xPos + 16, topY - 18 + level * 14);
        ctx.lineTo(xPos + 34 + level * 6, topY + level * 18);
        ctx.closePath();
        ctx.fill();
      });
      ctx.fillStyle = "#ff4c4c";
      ctx.beginPath();
      ctx.arc(xPos + 16, topY + 18, 4, 0, Math.PI * 2);
      ctx.arc(xPos + 8, topY + 34, 4, 0, Math.PI * 2);
      ctx.arc(xPos + 24, topY + 42, 4, 0, Math.PI * 2);
      ctx.fill();
    });

    ctx.fillStyle = "#d4e9f2";
    ctx.fillRect(0, h - 26, w, 26);
    return;
  }

  if (state.stage === 5) {
    const shamrockGradient = ctx.createLinearGradient(0, 0, 0, h);
    shamrockGradient.addColorStop(0, "#8feab0");
    shamrockGradient.addColorStop(0.4, "#c9f7d4");
    shamrockGradient.addColorStop(1, "#f2fff2");
    ctx.fillStyle = shamrockGradient;
    ctx.fillRect(0, 0, w, h);

    ctx.save();
    ctx.lineCap = "round";
    ctx.globalAlpha = 0.58;
    const rainbowCenterX = w * 0.52;
    const rainbowCenterY = horizon + 96;
    const rainbowColors = [
      "#ff6b7a",
      "#ffab5c",
      "#ffe36a",
      "#7fdd7f",
      "#67c6ff",
      "#7f8cff",
      "#bf8dff",
    ];
    rainbowColors.forEach((color, index) => {
      ctx.strokeStyle = color;
      ctx.lineWidth = 16 - index * 1.3;
      ctx.beginPath();
      ctx.arc(
        rainbowCenterX,
        rainbowCenterY,
        w * 0.46 - index * 9,
        Math.PI * 1.12,
        Math.PI * 1.88
      );
      ctx.stroke();
    });
    ctx.restore();

    ctx.fillStyle = "rgba(252, 255, 244, 0.82)";
    ctx.beginPath();
    ctx.arc(w - 76, 94, 42, 0, Math.PI * 2);
    ctx.fill();

    const hillOffset = (state.distance * 0.1) % w;
    ctx.fillStyle = "#6dcf7b";
    for (let i = -1; i < 3; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * w - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.18 - hillOffset, horizon - 60, i * w + w * 0.42 - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.64 - hillOffset, horizon - 56, i * w + w - hillOffset, horizon);
      ctx.lineTo(i * w + w - hillOffset, h);
      ctx.lineTo(i * w - hillOffset, h);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "#3f9b4f";
    ctx.fillRect(0, horizon, w, floorHeight);

    const shamrockXs = [54, 108, w - 96, w - 48];
    shamrockXs.forEach((xPos, index) => {
      const size = 16 + (index % 2) * 3;
      ctx.fillStyle = "#2f8d48";
      ctx.beginPath();
      ctx.arc(xPos, horizon - 34, size, 0, Math.PI * 2);
      ctx.arc(xPos - size * 0.92, horizon - 20, size, 0, Math.PI * 2);
      ctx.arc(xPos + size * 0.92, horizon - 20, size, 0, Math.PI * 2);
      ctx.arc(xPos, horizon - 6, size, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#236f37";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(xPos + 2, horizon - 4);
      ctx.quadraticCurveTo(xPos + 12, horizon + 18, xPos - 2, horizon + 32);
      ctx.stroke();
    });

    ctx.fillStyle = "#2f7040";
    ctx.fillRect(0, h - 26, w, 26);
    return;
  }

  if (state.stage === 6) {
    const nightGradient = ctx.createLinearGradient(0, 0, 0, h);
    nightGradient.addColorStop(0, "#091224");
    nightGradient.addColorStop(0.45, "#13284b");
    nightGradient.addColorStop(1, "#28456b");
    ctx.fillStyle = nightGradient;
    ctx.fillRect(0, 0, w, h);

    ctx.fillStyle = "rgba(243, 247, 255, 0.88)";
    ctx.beginPath();
    ctx.arc(w - 72, 92, 32, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "rgba(255,255,255,0.85)";
    for (let i = 0; i < 26; i += 1) {
      const sx = (i * 73 + Math.sin(i * 4.1) * 28) % w;
      const sy = 36 + (i * 47) % (h * 0.45);
      ctx.beginPath();
      ctx.arc(sx, sy, i % 5 === 0 ? 2 : 1.2, 0, Math.PI * 2);
      ctx.fill();
    }

    const hillOffset = (state.distance * 0.08) % w;
    ctx.fillStyle = "#1d3d35";
    for (let i = -1; i < 3; i += 1) {
      ctx.beginPath();
      ctx.moveTo(i * w - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.18 - hillOffset, horizon - 54, i * w + w * 0.42 - hillOffset, horizon);
      ctx.quadraticCurveTo(i * w + w * 0.62 - hillOffset, horizon - 48, i * w + w - hillOffset, horizon);
      ctx.lineTo(i * w + w - hillOffset, h);
      ctx.lineTo(i * w - hillOffset, h);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle = "#183223";
    ctx.fillRect(0, horizon, w, floorHeight);

    ctx.fillStyle = "#f3dc97";
    ctx.fillRect(38, horizon - 86, 86, 68);
    ctx.beginPath();
    ctx.moveTo(30, horizon - 86);
    ctx.lineTo(81, horizon - 124);
    ctx.lineTo(132, horizon - 86);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#ffeab8";
    ctx.fillRect(68, horizon - 54, 18, 24);

    ctx.fillStyle = "rgba(158, 255, 182, 0.18)";
    ctx.beginPath();
    ctx.ellipse(w * 0.58, horizon + 24, 92, 28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(w * 0.8, horizon + 12, 64, 20, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#142518";
    ctx.fillRect(0, h - 26, w, 26);
    return;
  }

  const fallGradient = ctx.createLinearGradient(0, 0, 0, h);
  fallGradient.addColorStop(0, "#ffd28a");
  fallGradient.addColorStop(0.45, "#ffe7bf");
  fallGradient.addColorStop(1, "#fff4de");
  ctx.fillStyle = fallGradient;
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = "rgba(255, 244, 214, 0.62)";
  ctx.beginPath();
  ctx.arc(w - 72, 94, 44, 0, Math.PI * 2);
  ctx.fill();

  const hillOffset = (state.distance * 0.12) % w;
  ctx.fillStyle = "#d78d43";
  for (let i = -1; i < 3; i += 1) {
    ctx.beginPath();
    ctx.moveTo(i * w - hillOffset, horizon);
    ctx.quadraticCurveTo(i * w + w * 0.18 - hillOffset, horizon - 62, i * w + w * 0.42 - hillOffset, horizon);
    ctx.quadraticCurveTo(i * w + w * 0.62 - hillOffset, horizon - 54, i * w + w - hillOffset, horizon);
    ctx.lineTo(i * w + w - hillOffset, h);
    ctx.lineTo(i * w - hillOffset, h);
    ctx.closePath();
    ctx.fill();
  }

  ctx.fillStyle = "#9a5f2a";
  ctx.fillRect(0, horizon, w, floorHeight);

  const treeXs = [56, 116, w - 78];
  treeXs.forEach((xPos, index) => {
    ctx.fillStyle = "#6d4425";
    ctx.fillRect(xPos, horizon - 56, 14, 56);
    const crownY = horizon - 72 - index * 6;
    ["#b84f27", "#cf7a2f", "#e3a73e"].forEach((color, colorIndex) => {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(xPos + 7 - colorIndex * 6, crownY + colorIndex * 8, 22 - colorIndex * 2, 0, Math.PI * 2);
      ctx.arc(xPos + 20 + colorIndex * 5, crownY + 4 + colorIndex * 5, 18 - colorIndex, 0, Math.PI * 2);
      ctx.fill();
    });
  });

  ctx.fillStyle = "#6c4323";
  ctx.fillRect(0, h - 26, w, 26);
  return;
}

  const stageStyles = {

    },
    4: {

      innerShade: "rgba(116, 97, 56, 0.18)",
      bundleA: "rgba(255, 240, 181, 0.76)",
      bundleB: "rgba(220, 196, 119, 0.72)",
      strawLine: "rgba(124, 96, 42, 0.32)",
      cap: "#fff0b9",
      rowLine: "rgba(153, 122, 62, 0.38)",
      accent: "snow",
    },
    5: {
      body: ["#f6e792", "#d9bb54", "#9c862c"],
      innerShade: "rgba(78, 99, 41, 0.14)",
      bundleA: "rgba(239, 231, 132, 0.74)",
      bundleB: "rgba(188, 176, 79, 0.72)",
